<body>
  <h1>Upload Presentations to Firestore</h1>
  <p>This will upload all 60 new Lord's Supper presentations to your Firestore database.</p>

  <div id="summary"></div>

  <button id="uploadBtn" onclick="uploadAll()">Upload All Presentations</button>
  <button onclick="checkExisting()">Check Existing Count</button>

  <div id="log"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAsMg0mXxevmFdPlVH6ilvymdryJWpU9pk",
      authDomain: "communion-table-talks.firebaseapp.com",
      projectId: "communion-table-talks",
      storageBucket: "communion-table-talks.firebasestorage.app",
      messagingSenderId: "6523279108",
      appId: "1:6523279108:web:2b953ffbc22b272a6b2251"
    });
    const db = firebase.firestore();

    function log(msg, type) {
      const el = document.getElementById('log');
      el.innerHTML += '<div class="status ' + (type || 'info') + '">' + msg + '</div>';
      el.scrollTop = el.scrollHeight;
    }

    async function checkExisting() {
      const snapshot = await db.collection('presentations').get();
      log('Currently ' + snapshot.size + ' presentations in Firestore.', 'info');
    }

    // All presentations data
    const briefPresentations = [{"title": "The Bread We Break", "scripturePassage": "1 Corinthians 10:16\u201317", "length": "brief", "summary": "The Lord's Supper is not just a personal moment \u2014 it is a shared one. The bread we break connects us to Christ and to one another.", "topicTags": ["unity", "body of Christ", "communion", "fellowship"], "suggestedHymns": ["Blest Be the Tie That Binds", "The Bond of Love", "We Are One in the Spirit"], "datePublished": "2026-01-04T00:00:00.000Z", "bodyText": "<p>Paul writes in 1 Corinthians 10:16\u201317:</p><blockquote>\"Is not the cup of thanksgiving for which we give thanks a participation in the blood of Christ? And is not the bread that we break a participation in the body of Christ? Because there is one loaf, we, who are many, are one body, for we all share the one loaf.\"</blockquote><p>There is something about this meal that we must not overlook: it is shared.</p><p>Yes, the Lord's Supper is deeply personal. You examine your own heart. You remember your own sin. You receive grace individually.</p><p>But you do not take it alone.</p><p>Paul says we all share the one loaf. That means when you eat this bread, you are not just connected to Christ \u2014 you are connected to every person in this room who belongs to Him.</p><p>The same body that was broken for you was broken for the person sitting next to you. The same blood that covers your sin covers theirs.</p><p>We are not just individuals who happen to be in the same building. We are one body \u2014 bound together by the cross.</p><p>So as you take the bread this morning, remember two things: Jesus gave His body for you. And He gave it for us.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Worthy Is the Lamb", "scripturePassage": "Revelation 5:9\u201312", "length": "brief", "summary": "Heaven's worship centers on the Lamb who was slain. When we take the Lord's Supper, we join that song.", "topicTags": ["worship", "Lamb of God", "heaven", "praise"], "suggestedHymns": ["Hallelujah, What a Savior!", "Crown Him with Many Crowns", "All Hail the Power of Jesus' Name"], "datePublished": "2026-01-11T00:00:00.000Z", "bodyText": "<p>In Revelation 5, John is given a glimpse into heaven's throne room. And what does he see at the center of it all?</p><p>Not a conquering general. Not a shining king on a golden throne.</p><p>A Lamb \u2014 looking as though it had been slain.</p><p>And around that Lamb, a chorus erupts:</p><blockquote>\"Worthy is the Lamb, who was slain, to receive power and wealth and wisdom and strength and honor and glory and praise!\" \u2014 Revelation 5:12</blockquote><p>That is what heaven sounds like. Not past tense worship. Present tense. Ongoing. Eternal. And all of it directed at the One who bled for sinners.</p><p>This morning, we gather around a table that echoes that same song.</p><p>The bread \u2014 His body, given for us.<br>The cup \u2014 His blood, poured out for our sins.</p><p>We are not just going through a ritual. We are joining a chorus that stretches from this room to the throne of God.</p><p>So take the bread. Take the cup. And let your heart whisper what heaven shouts:</p><p><em>Worthy is the Lamb.</em></p><p>Let's pray.</p>"}, {"title": "Once for All", "scripturePassage": "Hebrews 7:27; 10:10", "length": "brief", "summary": "The old sacrifices had to be repeated. The sacrifice of Jesus never does. He offered Himself once \u2014 and it was enough.", "topicTags": ["sacrifice", "sufficiency", "priesthood", "Hebrews"], "suggestedHymns": ["Nothing but the Blood", "Rock of Ages", "It Is Well with My Soul"], "datePublished": "2026-01-18T00:00:00.000Z", "bodyText": "<p>Under the old covenant, the priests never sat down.</p><p>They stood. Day after day. Sacrifice after sacrifice. The blood of bulls and goats could cover sin temporarily \u2014 but it could never take it away.</p><p>But Hebrews 7:27 says this about Jesus:</p><blockquote>\"He does not need to offer sacrifices day after day\u2026 He sacrificed for their sins once for all when He offered Himself.\"</blockquote><p>Once for all.</p><p>Not once for some. Not once for now. Once for all \u2014 for every sin, for every sinner, for all time.</p><p>And Hebrews 10:10 adds:</p><blockquote>\"We have been made holy through the sacrifice of the body of Jesus Christ once for all.\"</blockquote><p>That is why we do not come to this table to add anything to His work. We come to remember a sacrifice that is already complete.</p><p>The bread \u2014 a body offered once.<br>The cup \u2014 blood shed once.</p><p>And it was enough.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Blood Speaks", "scripturePassage": "Hebrews 12:24", "length": "brief", "summary": "Abel's blood cried out for justice. The blood of Jesus speaks something better \u2014 mercy.", "topicTags": ["blood of Christ", "mercy", "forgiveness", "Abel"], "suggestedHymns": ["There Is a Fountain", "Nothing but the Blood", "Are You Washed in the Blood"], "datePublished": "2026-01-25T00:00:00.000Z", "bodyText": "<p>In Genesis 4, after Cain murdered his brother, God said: \"Your brother's blood cries out to Me from the ground.\"</p><p>Abel's blood spoke. And what it said was: <em>Justice. Wrong has been done. Someone must answer for this.</em></p><p>But Hebrews 12:24 tells us that we have come to something greater:</p><blockquote>\"\u2026to Jesus the mediator of a new covenant, and to the sprinkled blood that speaks a better word than the blood of Abel.\"</blockquote><p>The blood of Jesus also speaks. But it does not cry out for vengeance.</p><p>It speaks mercy.<br>It speaks forgiveness.<br>It speaks peace.</p><p>Every time we take this cup, we are reminded that blood has been shed \u2014 not demanding our punishment, but declaring our pardon.</p><p>Abel's blood said, \"Someone must pay.\"<br>The blood of Christ says, \"Someone already has.\"</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Torn Veil", "scripturePassage": "Matthew 27:51; Hebrews 10:19\u201322", "length": "brief", "summary": "When Jesus died, the temple veil was torn from top to bottom. The way to God was opened \u2014 and it has never been closed.", "topicTags": ["access to God", "temple", "veil", "boldness"], "suggestedHymns": ["Near the Cross", "Into My Heart", "Open My Eyes That I May See"], "datePublished": "2026-02-01T00:00:00.000Z", "bodyText": "<p>At the moment Jesus breathed His last, something extraordinary happened in the temple.</p><p>Matthew 27:51 tells us:</p><blockquote>\"At that moment the curtain of the temple was torn in two from top to bottom.\"</blockquote><p>That veil had separated the Holy of Holies \u2014 the very presence of God \u2014 from everyone else. Only the high priest could pass through it, and only once a year.</p><p>But when Jesus died, God tore it open. Not from the bottom up \u2014 as if a man had done it. From top to bottom. God Himself opened the way.</p><p>Hebrews 10:19\u201322 tells us what that means for us:</p><blockquote>\"Therefore, brothers and sisters, since we have confidence to enter the Most Holy Place by the blood of Jesus\u2026 let us draw near to God.\"</blockquote><p>This table is a reminder that because of the cross, the way to God is open. No more barriers. No more distance. No more waiting outside.</p><p>The bread \u2014 His body, the cost of our access.<br>The cup \u2014 His blood, the key to the Father's presence.</p><p>Draw near. The veil is torn.</p><p>Let's pray.</p>"}, {"title": "Reconciled", "scripturePassage": "2 Corinthians 5:18\u201319", "length": "brief", "summary": "We were not just forgiven \u2014 we were brought back. The cross reconciled us to the God we had walked away from.", "topicTags": ["reconciliation", "peace with God", "restoration"], "suggestedHymns": ["Amazing Grace", "I Stand Amazed", "And Can It Be"], "datePublished": "2026-02-08T00:00:00.000Z", "bodyText": "<p>There is a difference between being pardoned and being brought home.</p><p>A pardon removes a penalty. But reconciliation restores a relationship.</p><p>And the cross did both.</p><p>Paul writes in 2 Corinthians 5:18\u201319:</p><blockquote>\"All this is from God, who reconciled us to Himself through Christ\u2026 God was reconciling the world to Himself in Christ, not counting people's sins against them.\"</blockquote><p>Notice who moved first. We did not reconcile ourselves to God. God reconciled us to Himself. We were the ones who walked away. He was the One who came after us.</p><p>And notice what reconciliation cost \u2014 it came <em>through Christ</em>. Through His body. Through His blood. Through the cross.</p><p>So when we take this bread, we remember more than forgiveness. We remember restoration \u2014 a broken relationship made whole.</p><p>When we drink this cup, we remember that we are not just pardoned criminals. We are welcomed children.</p><p>That is what the cross accomplished. Not just removal of guilt \u2014 but restoration of fellowship.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "He Carried Our Sorrows", "scripturePassage": "Isaiah 53:4", "length": "brief", "summary": "Jesus did not just carry our sins \u2014 He carried our grief. The cross was not only about guilt but about the full weight of human pain.", "topicTags": ["suffering", "compassion", "Isaiah 53", "grief"], "suggestedHymns": ["What a Friend We Have in Jesus", "Does Jesus Care", "Abide with Me"], "datePublished": "2026-02-15T00:00:00.000Z", "bodyText": "<p>We often speak of Jesus bearing our sins on the cross. And He did. But Isaiah says He carried something else, too.</p><blockquote>\"Surely He took up our pain and bore our suffering.\" \u2014 Isaiah 53:4</blockquote><p>Not just guilt. Grief.<br>Not just rebellion. Sorrow.<br>Not just the penalty of sin \u2014 but the <em>weight</em> of it.</p><p>Every heartbreak. Every loss. Every tear shed in the dark when no one was watching.</p><p>Jesus carried it.</p><p>He knows what it feels like to be abandoned by friends. He knows grief \u2014 He wept at the grave of Lazarus. He knows rejection, exhaustion, and sorrow \"even to the point of death.\"</p><p>So when you come to this table carrying something heavy this morning \u2014 and some of you are \u2014 know this: the One we remember here understands.</p><p>This bread represents a body that bore not only your sin, but your sorrow.<br>This cup represents blood shed by a Savior who carried your pain to the cross.</p><p>You are not alone in what you carry. He carried it first.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "From Death to Life", "scripturePassage": "John 5:24", "length": "brief", "summary": "Because of the cross, we have crossed over from death to life. The Lord's Supper is a celebration of that crossing.", "topicTags": ["eternal life", "salvation", "assurance", "crossing over"], "suggestedHymns": ["Because He Lives", "Blessed Assurance", "My Hope Is Built on Nothing Less"], "datePublished": "2026-02-22T00:00:00.000Z", "bodyText": "<p>Jesus said something in John 5:24 that should stop us in our tracks:</p><blockquote>\"Very truly I tell you, whoever hears My word and believes Him who sent Me has eternal life and will not be judged but has crossed over from death to life.\"</blockquote><p>Has crossed over. Past tense.</p><p>Not \"will cross over someday.\" Not \"might cross over if everything goes well.\" Has crossed over.</p><p>Because of the cross, death is behind us. Life is ahead. And the bridge between the two was built with nails, wood, and the blood of the Son of God.</p><p>That is what this table represents.</p><p>The bread \u2014 a body given so we could live.<br>The cup \u2014 blood poured out so we could cross over.</p><p>If you are in Christ this morning, you are not waiting for life. You already have it. The cross secured it. The empty tomb confirmed it.</p><p>So take the bread and the cup \u2014 not with fear, but with confidence. You have crossed over.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "No Condemnation", "scripturePassage": "Romans 8:1", "length": "brief", "summary": "For those in Christ, there is no condemnation. Not reduced condemnation. Not temporary relief. None.", "topicTags": ["freedom", "grace", "assurance", "Romans 8"], "suggestedHymns": ["It Is Well with My Soul", "Amazing Grace", "Redeemed"], "datePublished": "2026-03-01T00:00:00.000Z", "bodyText": "<p>Some of us come to this table carrying guilt. Old guilt. Fresh guilt. The kind that whispers, \"You don't really belong here.\"</p><p>To that voice, Paul gives one of the most powerful sentences in Scripture:</p><blockquote>\"Therefore, there is now no condemnation for those who are in Christ Jesus.\" \u2014 Romans 8:1</blockquote><p>No condemnation.</p><p>Not reduced condemnation. Not temporary relief. Not \"less condemnation than before.\"</p><p>None.</p><p>That word \"therefore\" points back to everything Paul has just argued \u2014 that the law could not save us, that our flesh is weak, that sin is relentless. And yet, in Christ, the verdict has already been handed down: not guilty.</p><p>Not because we are innocent. But because Someone took our sentence.</p><p>That is why we eat this bread \u2014 to remember the body that bore our condemnation.<br>That is why we drink this cup \u2014 to remember the blood that silenced the accusation.</p><p>So if guilt followed you to this table today, let it go. It has no authority here. The cross has spoken.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "While We Were Enemies", "scripturePassage": "Romans 5:10", "length": "brief", "summary": "God did not wait for us to become friendly toward Him. He reconciled us while we were still His enemies.", "topicTags": ["enemies", "reconciliation", "grace", "initiative of God"], "suggestedHymns": ["Amazing Grace", "I Stand Amazed", "Love Lifted Me"], "datePublished": "2026-03-08T00:00:00.000Z", "bodyText": "<p>Paul does not sugarcoat our condition before Christ. He does not call us \"seekers\" or \"spiritually curious.\" He uses a far harder word:</p><blockquote>\"For if, while we were God's enemies, we were reconciled to Him through the death of His Son, how much more, having been reconciled, shall we be saved through His life!\" \u2014 Romans 5:10</blockquote><p>Enemies.</p><p>Not people who were trying their best. Not people who were almost there. Enemies \u2014 hostile toward God, opposed to His will, dead in sin.</p><p>And that is when He saved us.</p><p>Not after we came around. Not after we cleaned up. While we were enemies.</p><p>That changes how we see this table. We did not earn a seat here. We were given one \u2014 by a God who loved us when we wanted nothing to do with Him.</p><p>This bread \u2014 His body, given for enemies.<br>This cup \u2014 His blood, shed for rebels.</p><p>And now, by His grace, enemies have become children.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Good Shepherd Lays Down His Life", "scripturePassage": "John 10:11, 14\u201315", "length": "brief", "summary": "Jesus is not a hired hand who runs when trouble comes. He is the Good Shepherd who willingly laid down His life for His sheep.", "topicTags": ["Good Shepherd", "sacrifice", "protection", "love"], "suggestedHymns": ["Savior Like a Shepherd Lead Us", "The Lord's My Shepherd", "He Leadeth Me"], "datePublished": "2026-03-15T00:00:00.000Z", "bodyText": "<p>Jesus said in John 10:11:</p><blockquote>\"I am the good shepherd. The good shepherd lays down His life for the sheep.\"</blockquote><p>A hired hand runs when the wolf comes. He works for wages, not love. When the cost gets too high, he leaves.</p><p>But a shepherd \u2014 a true shepherd \u2014 stays.</p><p>Jesus stayed. When the wolf came \u2014 when sin, death, and judgment bore down on His flock \u2014 He did not run. He did not negotiate. He stepped between us and destruction.</p><p>And He laid down His life.</p><p>Notice the language: He <em>laid it down</em>. It was not taken from Him. It was given. Willingly. Deliberately. Lovingly.</p><p>\"I lay down My life for the sheep\u2026 No one takes it from Me, but I lay it down of My own accord.\" \u2014 John 10:15, 18</p><p>This bread reminds us of a Shepherd who gave His body for the flock.<br>This cup reminds us of blood willingly poured out \u2014 not under compulsion, but out of love.</p><p>You are not forgotten. You are not abandoned. You belong to the Good Shepherd.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Love to the End", "scripturePassage": "John 13:1", "length": "brief", "summary": "Jesus did not love us partially or temporarily. He loved His own to the very end \u2014 and the cross proves it.", "topicTags": ["love", "perseverance", "devotion", "cross"], "suggestedHymns": ["My Jesus, I Love Thee", "O How He Loves You and Me", "The Love of God"], "datePublished": "2026-03-22T00:00:00.000Z", "bodyText": "<p>John introduces the final night of Jesus' life with a stunning sentence:</p><blockquote>\"Having loved His own who were in the world, He loved them to the end.\" \u2014 John 13:1</blockquote><p>To the end.</p><p>Not until they disappointed Him \u2014 which they would, that very night.<br>Not until it became too costly \u2014 which it would, within hours.<br>Not until they proved worthy \u2014 which they never did.</p><p>To the end.</p><p>That phrase carries the weight of everything that followed: the towel and basin, the broken bread, the garden prayer, the arrest, the trial, the cross.</p><p>Every step Jesus took that night was love in motion \u2014 moving toward the cross, not away from it.</p><p>And He did it knowing exactly who He was dying for. Imperfect, unreliable, sometimes faithless people. People like us.</p><p>This bread is proof that His love did not stop short.<br>This cup is proof that His love went all the way.</p><p>He loved us to the end. And His love has not ended yet.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "A Living Hope", "scripturePassage": "1 Peter 1:3", "length": "brief", "summary": "The resurrection did not just prove that Jesus was alive \u2014 it gave us a living hope that can never be taken away.", "topicTags": ["hope", "resurrection", "new birth", "assurance"], "suggestedHymns": ["Because He Lives", "Christ Arose", "My Hope Is Built on Nothing Less"], "datePublished": "2026-03-29T00:00:00.000Z", "bodyText": "<p>Peter writes:</p><blockquote>\"Praise be to the God and Father of our Lord Jesus Christ! In His great mercy He has given us new birth into a living hope through the resurrection of Jesus Christ from the dead.\" \u2014 1 Peter 1:3</blockquote><p>A living hope. Not a fading one. Not a wishful one. A hope that breathes because Christ does.</p><p>The world offers plenty of hopes \u2014 but they are fragile. A hope built on health fails when the diagnosis comes. A hope built on wealth fails when the market turns. A hope built on people fails when they let you down.</p><p>But a hope built on the resurrection? That hope is alive. Because He is alive.</p><p>The Lord's Supper points us to the cross \u2014 but the cross only means what it means because of the empty tomb. Jesus died. But He did not stay dead. And because He lives, our hope lives too.</p><p>This bread \u2014 a body that was buried but did not stay in the grave.<br>This cup \u2014 blood that purchased a future death cannot undo.</p><p>Take heart this morning. Your hope is not dead. It is risen.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Set Free", "scripturePassage": "Romans 6:6\u20137", "length": "brief", "summary": "The cross did not just forgive our sin \u2014 it broke sin's power over us. We are no longer slaves.", "topicTags": ["freedom", "slavery to sin", "new life", "power of the cross"], "suggestedHymns": ["Redeemed", "Amazing Grace", "Free from the Law"], "datePublished": "2026-04-05T00:00:00.000Z", "bodyText": "<p>Paul writes in Romans 6:6\u20137:</p><blockquote>\"For we know that our old self was crucified with Him so that the body ruled by sin might be done away with, that we should no longer be slaves to sin \u2014 because anyone who has died has been set free from sin.\"</blockquote><p>The cross did not just pardon us. It liberated us.</p><p>There is a difference. A pardon says, \"You will not be punished.\" Freedom says, \"You are no longer in chains.\"</p><p>Sin once held us captive. It dictated our habits, our thoughts, our choices. We were enslaved \u2014 even when we didn't fully realize it.</p><p>But at the cross, those chains were broken. Our old self was crucified with Christ. The power sin once held has been defeated.</p><p>That does not mean we never struggle. But it means the struggle is no longer hopeless. We fight from freedom, not toward it.</p><p>This bread \u2014 a body broken so our bondage could be broken.<br>This cup \u2014 blood shed so slaves could become sons and daughters.</p><p>You are free. Live like it.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "He Made Peace", "scripturePassage": "Colossians 1:19\u201320", "length": "brief", "summary": "Through the blood of the cross, God made peace between Himself and us. Not a truce \u2014 real peace.", "topicTags": ["peace", "blood of Christ", "Colossians", "reconciliation"], "suggestedHymns": ["It Is Well with My Soul", "Wonderful Peace", "Peace, Perfect Peace"], "datePublished": "2026-04-12T00:00:00.000Z", "bodyText": "<p>Paul writes in Colossians 1:19\u201320:</p><blockquote>\"For God was pleased to have all His fullness dwell in Him, and through Him to reconcile to Himself all things\u2026 by making peace through His blood, shed on the cross.\"</blockquote><p>Peace. Not a temporary ceasefire. Not an uneasy truce. Real, lasting peace \u2014 made through blood.</p><p>Before the cross, we were at war with God. Not always openly. Sometimes quietly. But the hostility was real \u2014 our sin stood between us and a holy God like a wall that no human effort could tear down.</p><p>And God tore it down Himself \u2014 through the blood of His Son.</p><p>That is what this cup represents. Not just forgiveness, but peace. The war is over. The debt is settled. The relationship is restored.</p><p>And that peace was not cheap \u2014 it was purchased at the highest possible price.</p><p>So as you take the bread and the cup this morning, let your heart be still. Peace has been made. Not by you \u2014 but for you.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Access to the Father", "scripturePassage": "Ephesians 2:13, 18", "length": "brief", "summary": "We who were once far away have been brought near by the blood of Christ. We now have access to the Father.", "topicTags": ["access", "nearness of God", "blood of Christ", "Ephesians"], "suggestedHymns": ["Near the Cross", "Into My Heart", "Draw Me Nearer"], "datePublished": "2026-04-19T00:00:00.000Z", "bodyText": "<p>Paul writes to the Ephesians \u2014 many of whom were Gentiles, outsiders to the covenant promises:</p><blockquote>\"But now in Christ Jesus you who once were far away have been brought near by the blood of Christ.\" \u2014 Ephesians 2:13</blockquote><p>Far away. That is where we all once stood. Not just geographically or culturally \u2014 but spiritually. Separated from God. Without access. Without hope.</p><p>But the blood of Christ changed our address.</p><p>We were far. Now we are near.<br>We were strangers. Now we are family.<br>We were outside. Now we have access.</p><p>Ephesians 2:18 says: \"For through Him we both have access to the Father by one Spirit.\"</p><p>Access. Not because of our pedigree. Not because of our performance. But because of His blood.</p><p>This bread reminds us that His body opened the way.<br>This cup reminds us that His blood brought us near.</p><p>You do not have to earn your way into God's presence. The cross has already brought you there.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Anchor of the Soul", "scripturePassage": "Hebrews 6:19\u201320", "length": "brief", "summary": "In a world that shifts and shakes, the hope we have in Christ is an anchor \u2014 firm and secure, reaching into the very presence of God.", "topicTags": ["hope", "anchor", "stability", "assurance"], "suggestedHymns": ["My Hope Is Built on Nothing Less", "Will Your Anchor Hold", "On Christ the Solid Rock"], "datePublished": "2026-04-26T00:00:00.000Z", "bodyText": "<p>Life is not always steady. Circumstances shift. Health changes. Relationships strain. And sometimes the ground beneath our feet feels like it is moving.</p><p>But Hebrews 6:19\u201320 says this:</p><blockquote>\"We have this hope as an anchor for the soul, firm and secure. It enters the inner sanctuary behind the curtain, where our forerunner, Jesus, has entered on our behalf.\"</blockquote><p>An anchor does not stop the storm. But it keeps you from drifting.</p><p>And our anchor is not a philosophy. Not a principle. It is a Person \u2014 Jesus, who has already entered the presence of God on our behalf.</p><p>He is there now. Seated. Interceding. Holding us fast.</p><p>When we take the Lord's Supper, we are gripping that anchor. We are reminding our hearts that no matter what this week has brought \u2014 or what next week may bring \u2014 we are tethered to something that cannot be moved.</p><p>This bread \u2014 His body, the cost of our security.<br>This cup \u2014 His blood, the guarantee of our hope.</p><p>Hold on. The anchor holds.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Fragrance of the Offering", "scripturePassage": "Ephesians 5:2", "length": "brief", "summary": "Christ's sacrifice was not just sufficient \u2014 it was pleasing to God. He gave Himself as a fragrant offering.", "topicTags": ["offering", "pleasing to God", "love", "sacrifice"], "suggestedHymns": ["When I Survey the Wondrous Cross", "I Surrender All", "Take My Life and Let It Be"], "datePublished": "2026-05-03T00:00:00.000Z", "bodyText": "<p>Paul writes in Ephesians 5:2:</p><blockquote>\"Walk in the way of love, just as Christ loved us and gave Himself up for us as a fragrant offering and sacrifice to God.\"</blockquote><p>A fragrant offering. That language comes from the Old Testament sacrificial system, where the aroma of certain offerings was described as \"pleasing to the Lord.\"</p><p>And here Paul applies that language to the cross.</p><p>The sacrifice of Jesus was not just necessary \u2014 it was beautiful to God. Not because God delights in suffering, but because the offering represented perfect obedience, perfect love, and perfect surrender.</p><p>Jesus gave Himself willingly. Completely. Lovingly. And the Father received that offering with approval.</p><p>So this morning, as we take the bread and the cup, we are remembering something that was not only costly \u2014 it was precious. It was the one offering that fully satisfied the justice and the love of God.</p><p>This bread \u2014 a body given as a sweet aroma before the throne.<br>This cup \u2014 blood poured out in perfect, pleasing sacrifice.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Not Ashamed", "scripturePassage": "Romans 1:16", "length": "brief", "summary": "The message of the cross may seem foolish to the world, but it is the power of God for salvation. We are not ashamed of it.", "topicTags": ["gospel", "power of God", "boldness", "salvation"], "suggestedHymns": ["I'm Not Ashamed to Own My Lord", "Stand Up, Stand Up for Jesus", "Faith Is the Victory"], "datePublished": "2026-05-10T00:00:00.000Z", "bodyText": "<p>Paul declares in Romans 1:16:</p><blockquote>\"For I am not ashamed of the gospel, because it is the power of God that brings salvation to everyone who believes.\"</blockquote><p>The world has never known quite what to do with the cross. To some, it looks like weakness. To others, foolishness. A crucified Savior is not what the world expects \u2014 or wants.</p><p>But Paul says he is not ashamed. Why?</p><p>Because the gospel works. It does not merely inform \u2014 it transforms. It does not merely teach \u2014 it saves. It is <em>power</em>.</p><p>And that power flows from the very event we remember at this table: the death, burial, and resurrection of Jesus Christ.</p><p>This bread represents a body that the world despised \u2014 but God used to save.<br>This cup represents blood that the world dismissed \u2014 but heaven honored.</p><p>We are not ashamed of this message. We are not ashamed of this table. Because the cross that the world calls foolish is the wisest, most powerful act in all of history.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Grace at the Table", "scripturePassage": "Ephesians 2:8-9", "length": "brief", "summary": "We do not come to this table because we earned a seat. We come because grace pulled out the chair. Salvation is a gift \u2014 and this meal is a reminder of it.", "topicTags": ["grace", "gift", "Ephesians", "unmerited"], "suggestedHymns": ["Amazing Grace", "Grace Greater Than Our Sin", "Marvelous Grace"], "datePublished": "2026-05-17T00:00:00.000Z", "bodyText": "<p>Paul writes in Ephesians 2:8\u20139:</p><blockquote>\"For it is by grace you have been saved, through faith \u2014 and this is not from yourselves, it is the gift of God \u2014 not by works, so that no one can boast.\"</blockquote><p>Gift. That word should change how we approach this table.</p><p>We did not earn a place here. We did not qualify. We did not pass a test or meet a threshold. We were given a seat \u2014 by grace.</p><p>Grace means that God moved toward us before we moved toward Him. Grace means the price was paid before we knew we owed it. Grace means we are welcomed not because of who we are, but because of what Christ has done.</p><p>Some of us come to this table feeling unworthy. And in one sense, that is exactly right \u2014 none of us are worthy of what happened on the cross. But unworthiness is not a reason to stay away. It is the very reason grace exists.</p><p>This bread \u2014 a gift of broken body, given freely.<br>This cup \u2014 a gift of shed blood, poured out for the undeserving.</p><p>You did not earn this. You cannot repay it. You can only receive it \u2014 and give thanks.</p><p>Let's remember Him now. Let's pray.</p>"}];
    const medium1Presentations = [{"title": "The Scars He Kept", "scripturePassage": "John 20:24\u201328", "length": "medium", "summary": "When Jesus rose from the dead, He kept His scars. He showed them to Thomas \u2014 not as a rebuke, but as proof that love always leaves a mark.", "topicTags": ["resurrection", "Thomas", "scars", "proof of love"], "suggestedHymns": ["He Lives", "My Redeemer Lives", "I Know That My Redeemer Lives"], "datePublished": "2026-01-04T00:00:00.000Z", "bodyText": "<p>When Jesus rose from the dead, He could have had any kind of body. He could have returned without a trace of what happened on Friday. Glorified. Unblemished. Untouched.</p><p>But He didn't.</p><p>He kept the scars.</p><p>When Thomas doubted, Jesus didn't argue with him. He didn't lecture him about faith. He simply said:</p><blockquote>\"Put your finger here; see My hands. Reach out your hand and put it into My side. Stop doubting and believe.\" \u2014 John 20:27</blockquote><p>And Thomas fell to his knees: \"My Lord and my God!\"</p><p>Why did Jesus keep the scars?</p><p>Because scars are proof. Not of weakness \u2014 of love. They are evidence that something costly happened. That a wound was endured. That a price was paid.</p><p>The scars in His hands tell us that the nails were real. The wound in His side tells us that the spear was real. And the resurrection tells us that His sacrifice was accepted.</p><p>There is a beautiful thought in this: in all of eternity, the only man-made things in heaven will be the scars on the body of Jesus.</p><p>No monuments. No trophies. No buildings. Just the marks of a love that bled.</p><p>And those scars are not a source of shame for Him. They are a source of identity. Revelation describes Him in heaven as \"a Lamb, looking as though it had been slain.\" Even in glory, He bears the evidence of the cross.</p><p>So when you take this bread today, remember \u2014 you are not remembering a theory. You are remembering a body that was pierced and still bears the proof.</p><p>When you take this cup, remember \u2014 you are not participating in a tradition. You are remembering blood that was real, shed by a Savior who chose to keep the scars so we would never forget.</p><p>Thomas saw them and believed. We remember them and give thanks.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Night He Was Betrayed", "scripturePassage": "1 Corinthians 11:23\u201326", "length": "medium", "summary": "Paul anchors the Lord's Supper to a specific night \u2014 the night Jesus was betrayed. The timing matters. Jesus gave us this meal in His darkest hour.", "topicTags": ["institution of the supper", "betrayal", "remembrance", "1 Corinthians 11"], "suggestedHymns": ["'Tis Midnight and on Olive's Brow", "Lead Me to Calvary", "When I Survey the Wondrous Cross"], "datePublished": "2026-01-11T00:00:00.000Z", "bodyText": "<p>Paul writes in 1 Corinthians 11:23:</p><blockquote>\"The Lord Jesus, on the night He was betrayed, took bread\u2026\"</blockquote><p>That phrase \u2014 \"on the night He was betrayed\" \u2014 is not just a timestamp. It is a window into the heart of Christ.</p><p>Think about what was happening that night. Judas had already made his deal. The religious leaders were finalizing their plot. Peter was about to deny Him. Every disciple would scatter before sunrise.</p><p>Jesus knew all of this. He knew who would betray Him. He knew who would deny Him. He knew what the next twelve hours would bring \u2014 the garden, the arrest, the trial, the scourging, the cross.</p><p>And in that moment \u2014 not in a moment of triumph, not after the resurrection, not from a place of comfort \u2014 Jesus took bread, gave thanks, and broke it.</p><p>He gave us this meal from the valley, not the mountaintop.</p><p>That tells us something important: the Lord's Supper was not born out of celebration. It was born out of sacrifice. It was given to us by a Savior who was hours away from the worst suffering in human history \u2014 and He spent that time thinking about us.</p><p>\"This is My body, given for you. Do this in remembrance of Me.\"</p><p>He was about to be broken. And yet His concern was that we would remember.</p><p>\"This cup is the new covenant in My blood. Do this, whenever you drink it, in remembrance of Me.\"</p><p>Paul adds in verse 26: \"For whenever you eat this bread and drink this cup, you proclaim the Lord's death until He comes.\"</p><p>Every time we gather at this table, we are announcing to the world \u2014 and reminding ourselves \u2014 that on the worst night of His life, Jesus gave us the greatest gift of His love.</p><p>So take this bread with reverence. Take this cup with gratitude. And remember: He gave us this meal not when it was easy, but when it cost Him everything.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Passover Fulfilled", "scripturePassage": "1 Corinthians 5:7; Exodus 12:13", "length": "medium", "summary": "The Passover lamb pointed forward for centuries. When Jesus went to the cross, the shadow became substance. Our Passover Lamb has been sacrificed.", "topicTags": ["Passover", "lamb", "fulfillment", "Exodus"], "suggestedHymns": ["Nothing but the Blood", "Are You Washed in the Blood", "The Old Rugged Cross"], "datePublished": "2026-01-18T00:00:00.000Z", "bodyText": "<p>On the night Israel was delivered from Egypt, God gave them specific instructions. Take a lamb \u2014 unblemished, without defect. Kill it at twilight. Take the blood and put it on the doorposts of your house.</p><p>And God said in Exodus 12:13:</p><blockquote>\"When I see the blood, I will pass over you. No destructive plague will touch you when I strike Egypt.\"</blockquote><p>The blood of the lamb stood between God's people and judgment. Not their goodness. Not their effort. The blood.</p><p>For over a thousand years, Israel repeated that meal. Every Passover, they retold the story. They remembered the lamb. They remembered the blood. They remembered that God had delivered them.</p><p>And then, one Passover night in an upper room in Jerusalem, Jesus took the bread and the cup and changed everything.</p><p>He was the Lamb the Passover had been pointing to all along.</p><p>Paul says it plainly in 1 Corinthians 5:7:</p><blockquote>\"For Christ, our Passover lamb, has been sacrificed.\"</blockquote><p>Every lamb slaughtered in Egypt. Every lamb offered on the temple altar. Every drop of blood on every doorpost for a thousand years \u2014 all of it was a shadow. The substance was Christ.</p><p>His blood does not just cover a doorway. It covers a life.<br>His sacrifice does not just delay judgment. It removes it.</p><p>So when we take this bread, we remember a body that the Passover anticipated for centuries.<br>When we take this cup, we remember the blood that God has always required \u2014 and that Christ alone could provide.</p><p>The lamb has been slain. The blood has been applied. And death passes over.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "A Table in the Wilderness", "scripturePassage": "Psalm 23:5; 1 Corinthians 10:16", "length": "medium", "summary": "David said God prepared a table for him in the presence of his enemies. The Lord's Supper is that table \u2014 set for us even in the middle of a broken world.", "topicTags": ["Psalm 23", "provision", "comfort", "God's presence"], "suggestedHymns": ["The Lord's My Shepherd", "He Leadeth Me", "Be with Me, Lord"], "datePublished": "2026-01-25T00:00:00.000Z", "bodyText": "<p>David writes in Psalm 23:5:</p><blockquote>\"You prepare a table before me in the presence of my enemies.\"</blockquote><p>Notice where the table is set. Not in a palace. Not behind locked doors. Not after the enemies have been defeated.</p><p>In the presence of enemies. In the middle of the fight. In the wilderness, where danger is real and the ground is uncertain.</p><p>And yet \u2014 there is a table.</p><p>God does not always remove the difficulty before He provides the comfort. Sometimes He prepares the table right in the middle of it.</p><p>That is what the Lord's Supper is.</p><p>We live in a world that is broken. Relationships strain. Bodies fail. Temptation presses in. Loss is real. And yet every Lord's day, God sets a table for us.</p><p>Not a table of escape \u2014 but a table of presence. A reminder that He is with us, even here. Even now.</p><p>Paul calls it \"the cup of blessing\" and \"a participation in the body of Christ\" (1 Corinthians 10:16). It is communion \u2014 not just with bread and juice, but with the living God who feeds us in the wilderness.</p><p>Maybe you came this morning carrying something heavy. A worry. A grief. A struggle you haven't told anyone about.</p><p>God knows. And He has prepared a table for you \u2014 not after the battle, but in the middle of it.</p><p>This bread \u2014 His body, sustaining you.<br>This cup \u2014 His blood, covering you.<br>This table \u2014 His presence, surrounding you.</p><p>Even in the wilderness, He provides.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Darkness at Noon", "scripturePassage": "Mark 15:33\u201334; 2 Corinthians 5:21", "length": "medium", "summary": "For three hours, darkness covered the land while Jesus hung on the cross. That darkness was not weather \u2014 it was the weight of sin being laid on the sinless Son of God.", "topicTags": ["darkness", "separation", "wrath", "substitution"], "suggestedHymns": ["Alas, and Did My Savior Bleed", "O Sacred Head Now Wounded", "Were You There"], "datePublished": "2026-02-01T00:00:00.000Z", "bodyText": "<p>Mark 15:33 records something that has no natural explanation:</p><blockquote>\"At noon, darkness came over the whole land until three in the afternoon.\"</blockquote><p>Three hours of darkness. In the middle of the day. The sun did not simply dim \u2014 it withdrew. As if creation itself could not bear to watch what was happening on that cross.</p><p>And from the center of that darkness came the most agonizing cry in all of Scripture:</p><blockquote>\"My God, My God, why have You forsaken Me?\" \u2014 Mark 15:34</blockquote><p>Those words were not metaphor. They were not dramatic effect. Jesus, the eternal Son of God, who had never for one moment been separated from His Father \u2014 experienced separation.</p><p>Why?</p><p>Because our sin was placed on Him.</p><p>Paul writes in 2 Corinthians 5:21: \"God made Him who had no sin to be sin for us, so that in Him we might become the righteousness of God.\"</p><p>That is what the darkness was about. It was the moment when the sinless One absorbed the full weight of a world's rebellion. The Father did not look away out of cruelty \u2014 He turned His face because holy justice required it. Sin and holiness cannot coexist. And in that moment, Jesus bore it all.</p><p>So that we would never have to.</p><p>The darkness was temporary. Three hours. And then it lifted. Because the price had been paid. The separation was endured. And the way to the Father was opened again \u2014 not for Jesus, who had always been there, but for us, who had never been able to reach Him on our own.</p><p>This bread \u2014 a body that endured the darkness for us.<br>This cup \u2014 blood shed in those terrible hours so we could walk in light.</p><p>The darkness has passed. The Son has risen. And we are no longer forsaken.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Bought at a Price", "scripturePassage": "1 Corinthians 6:19\u201320; 7:23", "length": "medium", "summary": "Paul tells the Corinthians twice: you were bought at a price. The Lord's Supper is a weekly reminder that we belong to the One who purchased us.", "topicTags": ["redemption", "ownership", "stewardship", "identity"], "suggestedHymns": ["Redeemed", "I Am Thine, O Lord", "Take My Life and Let It Be"], "datePublished": "2026-02-08T00:00:00.000Z", "bodyText": "<p>Paul says it twice in 1 Corinthians \u2014 once in chapter 6, and again in chapter 7 \u2014 because apparently we need to hear it more than once:</p><blockquote>\"You are not your own; you were bought at a price.\" \u2014 1 Corinthians 6:19\u201320</blockquote><blockquote>\"You were bought at a price; do not become slaves of human beings.\" \u2014 1 Corinthians 7:23</blockquote><p>Bought at a price. That is marketplace language. Redemption language. It means someone paid something to acquire us.</p><p>In the ancient world, slaves could be purchased and set free. The price was paid. The chains were removed. The person walked away belonging to a new master \u2014 or to no one at all.</p><p>But Paul says we were bought \u2014 and now we belong to God. We are not our own.</p><p>That should change how we think about everything. Our bodies, our time, our choices, our ambitions \u2014 none of it is ultimately ours. It belongs to the One who paid for it.</p><p>And what was the price? Not silver. Not gold. Peter tells us that. The price was the precious blood of Christ.</p><p>So this table is a reminder of ownership. Not oppressive ownership \u2014 the kind that crushes. But loving ownership \u2014 the kind that frees.</p><p>We were slaves to sin. He bought us out. We were captive. He paid the ransom. And now we belong to Him \u2014 not because we earned it, but because He purchased it.</p><p>This bread \u2014 the body that was the price.<br>This cup \u2014 the blood that sealed the transaction.</p><p>You have been bought. You are valued. And you belong to a God whose purchase of you is the greatest proof of your worth.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Until He Comes", "scripturePassage": "1 Corinthians 11:26; Revelation 22:20", "length": "medium", "summary": "Every Lord's Supper is both a look back and a look ahead. We remember His death \u2014 and we proclaim it until He returns.", "topicTags": ["second coming", "hope", "proclamation", "anticipation"], "suggestedHymns": ["When We All Get to Heaven", "Face to Face", "It Won't Be Very Long"], "datePublished": "2026-02-15T00:00:00.000Z", "bodyText": "<p>Paul writes in 1 Corinthians 11:26:</p><blockquote>\"For whenever you eat this bread and drink this cup, you proclaim the Lord's death until He comes.\"</blockquote><p>Two words at the end of that sentence carry enormous weight: <em>until He comes.</em></p><p>This means the Lord's Supper is not only a memorial. It is a proclamation with an expiration date. We will not do this forever. There is a day coming when the bread and the cup will no longer be needed \u2014 because we will see Him face to face.</p><p>Every Lord's day, we look back. We remember the cross. We reflect on the body broken and the blood shed.</p><p>But we also look forward. We declare, by this very act, that this is not the end of the story. He is coming back.</p><p>The early church lived with that anticipation. They gathered on the first day of the week, broke bread together, and said to each other \u2014 and to the watching world \u2014 \"He died. He rose. And He's coming again.\"</p><p>Revelation 22:20 captures that longing:</p><blockquote>\"He who testifies to these things says, 'Yes, I am coming soon.' Amen. Come, Lord Jesus.\"</blockquote><p>So this table faces two directions. Behind us \u2014 the cross. Ahead of us \u2014 the crown.</p><p>This bread points back to a body given. But it also points ahead to a day when every tear will be wiped away.<br>This cup points back to blood shed. But it also points ahead to a feast in the presence of the King.</p><p>We are not just remembering. We are waiting. And one day, the waiting will be over.</p><p>Until then, we proclaim His death. Until He comes.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Stone the Builders Rejected", "scripturePassage": "1 Peter 2:4\u20137; Psalm 118:22", "length": "medium", "summary": "The world rejected Jesus. But God made Him the cornerstone of everything. At this table, we honor the One the world threw away.", "topicTags": ["cornerstone", "rejection", "chosen by God", "1 Peter"], "suggestedHymns": ["The Church's One Foundation", "Christ Is Made the Sure Foundation", "On Christ the Solid Rock"], "datePublished": "2026-02-22T00:00:00.000Z", "bodyText": "<p>Peter writes in 1 Peter 2:4:</p><blockquote>\"As you come to Him, the living Stone \u2014 rejected by humans but chosen by God and precious to Him\u2026\"</blockquote><p>Rejected by humans. Chosen by God. Precious.</p><p>That is the paradox of the cross. The One the world threw away is the One God exalted. The stone the builders looked at and said, \"We don't need this\" \u2014 God made the cornerstone of everything.</p><p>Psalm 118:22 prophesied it long before it happened: \"The stone the builders rejected has become the cornerstone.\"</p><p>And that is exactly what happened at Calvary. The religious leaders rejected Him. The Roman government discarded Him. The crowd chose a criminal instead. They looked at Jesus and saw someone expendable.</p><p>But God saw something else. He saw the foundation of salvation. The cornerstone of a new covenant. The living Stone on which the church would be built.</p><p>Peter continues in verse 7: \"Now to you who believe, this stone is precious.\"</p><p>Precious. That is the word. The same One the world counted as worthless, we count as priceless.</p><p>And that is what this table is about. At this table, we do the opposite of what the world did at the cross. The world rejected Him \u2014 we receive Him. The world mocked Him \u2014 we worship Him. The world threw Him away \u2014 we hold Him close.</p><p>This bread represents the body the world discarded \u2014 but we treasure.<br>This cup represents the blood the world spilled \u2014 but we honor.</p><p>The builders may have rejected Him. But He is our cornerstone. And everything we are rests on Him.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "What Wondrous Love", "scripturePassage": "Romans 5:6\u20138", "length": "medium", "summary": "Paul builds a case for the love of God in three layers \u2014 while we were powerless, while we were sinners, while we were enemies. Each layer makes the love more astonishing.", "topicTags": ["love of God", "grace", "Romans 5", "while we were sinners"], "suggestedHymns": ["I Stand Amazed", "The Love of God", "O How He Loves You and Me"], "datePublished": "2026-03-01T00:00:00.000Z", "bodyText": "<p>In Romans 5, Paul builds a case for the love of God \u2014 and each layer makes it more staggering.</p><p>First, verse 6:</p><blockquote>\"You see, at just the right time, when we were still powerless, Christ died for the ungodly.\"</blockquote><p>Powerless. Unable to save ourselves. Unable to fix what was broken. And <em>that</em> is when Christ died.</p><p>Then verse 7:</p><blockquote>\"Very rarely will anyone die for a righteous person, though for a good person someone might possibly dare to die.\"</blockquote><p>Paul acknowledges reality. Human love has limits. We might \u2014 <em>might</em> \u2014 sacrifice for someone noble. Someone deserving. Someone who has earned it.</p><p>But then comes verse 8:</p><blockquote>\"But God demonstrates His own love for us in this: While we were still sinners, Christ died for us.\"</blockquote><p>Not while we were worthy. Not while we were improving. Not while we were reaching out to Him.</p><p>While we were sinners.</p><p>That is the defining difference of God's love. Human love responds to goodness. God's love responds to need. Human love rewards the deserving. God's love rescues the undeserving.</p><p>And the proof is not a promise written in the sky. The proof is a cross planted in the ground. A real body. Real blood. A real death \u2014 for people who were still in rebellion against Him.</p><p>That is what this table celebrates. Not that we loved God \u2014 but that He loved us first. Not that we came to Him \u2014 but that He came for us.</p><p>This bread \u2014 a body given for the powerless.<br>This cup \u2014 blood shed for the ungodly.</p><p>What wondrous love is this.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "He Became Poor", "scripturePassage": "2 Corinthians 8:9", "length": "medium", "summary": "Jesus did not just leave heaven \u2014 He emptied Himself of glory so that we, in our spiritual poverty, could become rich.", "topicTags": ["incarnation", "sacrifice", "riches of Christ", "poverty"], "suggestedHymns": ["How Great Thou Art", "I Stand Amazed", "Hallelujah, What a Savior!"], "datePublished": "2026-03-08T00:00:00.000Z", "bodyText": "<p>Paul writes in 2 Corinthians 8:9:</p><blockquote>\"For you know the grace of our Lord Jesus Christ, that though He was rich, yet for your sake He became poor, so that you through His poverty might become rich.\"</blockquote><p>Think about what Jesus left behind.</p><p>He was rich. Not in earthly terms \u2014 but in eternal ones. He possessed the full glory of heaven. The worship of angels. Unbroken communion with the Father. Authority over everything that exists.</p><p>And He walked away from all of it.</p><p>He became poor. Born in a borrowed stable. Raised in an obscure village. \"Foxes have dens and birds have nests,\" He said, \"but the Son of Man has no place to lay His head.\"</p><p>He was mocked by the people He created. Betrayed by a friend He had chosen. Stripped naked and executed between criminals on a garbage heap outside Jerusalem.</p><p>That is poverty. Not just material poverty \u2014 but the poverty of rejection, abandonment, and bearing a world's worth of sin.</p><p>And why? \"So that you through His poverty might become rich.\"</p><p>Not rich in money. Rich in grace. Rich in forgiveness. Rich in hope. Rich in access to God. Rich in an inheritance that can never perish, spoil, or fade.</p><p>That is the exchange of the cross. He took our poverty \u2014 spiritual bankruptcy, hopelessness, death \u2014 and gave us His riches \u2014 life, peace, and eternity with God.</p><p>This bread \u2014 the body of the One who became poor for us.<br>This cup \u2014 the blood that purchased our eternal wealth.</p><p>He gave up everything so that we could have everything that matters.</p><p>Let's remember Him now. Let's pray.</p>"}];
    const medium2Presentations = [{"title": "The Blood of the Covenant", "scripturePassage": "Hebrews 9:11\u201314; Matthew 26:28", "length": "medium", "summary": "The old covenant was sealed with the blood of animals. The new covenant was sealed with something far more precious \u2014 the blood of Christ.", "topicTags": ["new covenant", "blood", "Hebrews", "priesthood"], "suggestedHymns": ["Nothing but the Blood", "There Is a Fountain", "Hallelujah, What a Savior!"], "datePublished": "2026-03-15T00:00:00.000Z", "bodyText": "<p>When Moses sealed the covenant at Sinai, he took the blood of animals and sprinkled it on the people, saying: \"This is the blood of the covenant that the Lord has made with you.\"</p><p>Blood sealed the deal. That was always how covenants worked in the ancient world. A covenant without blood was not binding.</p><p>Centuries later, in an upper room, Jesus took a cup and said something that would have stopped every Jewish heart in the room:</p><blockquote>\"This is My blood of the covenant, which is poured out for many for the forgiveness of sins.\" \u2014 Matthew 26:28</blockquote><p>My blood. Not the blood of bulls and goats. My blood.</p><p>Jesus was announcing a new covenant \u2014 sealed not with an animal sacrifice, but with His own life.</p><p>The writer of Hebrews explains the superiority of this sacrifice:</p><blockquote>\"How much more, then, will the blood of Christ, who through the eternal Spirit offered Himself unblemished to God, cleanse our consciences from acts that lead to death, so that we may serve the living God!\" \u2014 Hebrews 9:14</blockquote><p>The old blood covered. The new blood cleanses.<br>The old blood had to be offered repeatedly. The new blood was offered once.<br>The old blood pointed forward. The new blood fulfills.</p><p>Every time we take this cup, we are participating in a covenant that was purchased at the highest price imaginable. We are not just sipping juice. We are remembering the blood that ratified our relationship with God.</p><p>This bread \u2014 a body given to seal the covenant.<br>This cup \u2014 the blood of the new covenant, poured out for you.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Spotless Lamb", "scripturePassage": "1 Peter 1:18\u201319; Hebrews 9:14", "length": "medium", "summary": "The sacrificial system required lambs without blemish. Jesus was the only truly spotless Lamb \u2014 and His perfection is what makes our redemption secure.", "topicTags": ["perfection of Christ", "lamb", "sinlessness", "redemption"], "suggestedHymns": ["Nothing but the Blood", "The Old Rugged Cross", "Alas, and Did My Savior Bleed"], "datePublished": "2026-03-22T00:00:00.000Z", "bodyText": "<p>Under the old covenant, when someone brought a lamb for sacrifice, the animal had to be inspected. No broken bones. No blemishes. No defects. It had to be without spot.</p><p>That requirement was not arbitrary. It taught Israel \u2014 and it teaches us \u2014 that what is offered to God must be perfect. Nothing flawed can atone for sin.</p><p>And every lamb offered on every altar was, at best, a shadow. They were physically spotless, but they were still animals. They could not truly understand what they were dying for. And their blood could never permanently remove sin.</p><p>But Peter writes about a different Lamb:</p><blockquote>\"You were redeemed\u2026 with the precious blood of Christ, a lamb without blemish or defect.\" \u2014 1 Peter 1:18\u201319</blockquote><p>Jesus was not just physically spotless. He was morally spotless. Spiritually spotless. In every thought, every motive, every word, every action \u2014 He was without sin.</p><p>Hebrews 9:14 says He \"offered Himself unblemished to God.\" The perfection of the sacrifice is what gives it its power.</p><p>This is why our salvation is secure. It does not rest on a flawed offering. It does not depend on a sacrifice that might have been insufficient. It rests on the only truly spotless Lamb who ever lived \u2014 and who willingly laid down His life.</p><p>If the lamb had been blemished, the offering would have been rejected. But Jesus was perfect. And His offering was accepted \u2014 fully, finally, forever.</p><p>This bread \u2014 the body of the spotless Lamb.<br>This cup \u2014 the precious blood, without blemish or defect.</p><p>Our redemption is secure because the Lamb was perfect.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Made Alive Together", "scripturePassage": "Ephesians 2:4\u20136", "length": "medium", "summary": "We were dead in our sins. But God, being rich in mercy, made us alive together with Christ. The Lord's Supper celebrates the miracle of being raised from spiritual death.", "topicTags": ["new life", "mercy", "Ephesians", "raised with Christ"], "suggestedHymns": ["Amazing Grace", "Arise, My Soul, Arise", "Christ Arose"], "datePublished": "2026-03-29T00:00:00.000Z", "bodyText": "<p>Paul does not begin Ephesians 2 with a compliment. He begins with a diagnosis:</p><p>\"You were dead in your transgressions and sins.\"</p><p>Dead. Not sick. Not struggling. Not underperforming. Dead.</p><p>That is the condition of every person apart from Christ. Spiritually lifeless. Unable to revive themselves. Unable to earn their way back to God.</p><p>But then come four of the most beautiful words in Scripture:</p><blockquote>\"But because of His great love for us, God, who is rich in mercy, made us alive with Christ even when we were dead in transgressions \u2014 it is by grace you have been saved.\" \u2014 Ephesians 2:4\u20135</blockquote><p>But God.</p><p>Those two words change everything. We were dead \u2014 <em>but God</em>. We were helpless \u2014 <em>but God</em>. We had no hope \u2014 <em>but God, who is rich in mercy</em>.</p><p>And what did He do? He \"made us alive together with Christ.\" Not independently. Not on our own. Together with Him. Our life is bound to His life. His resurrection is the engine of our new birth.</p><p>Paul goes even further in verse 6: \"And God raised us up with Christ and seated us with Him in the heavenly realms in Christ Jesus.\"</p><p>We are not just alive. We are raised. We are seated. In God's eyes, our position is already secure \u2014 because it rests not on our performance, but on Christ's resurrection.</p><p>That is what this table celebrates. Not just the death of Jesus \u2014 but the life that death produced.</p><p>This bread \u2014 a body that died so we could be made alive.<br>This cup \u2014 blood shed so the dead could be raised.</p><p>We were dead. But God made us alive. And that changes everything.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Power of the Blood", "scripturePassage": "Romans 3:24\u201326", "length": "medium", "summary": "How can a holy God justify sinners and remain just? The answer is the blood of Christ \u2014 the only sacrifice that satisfies both justice and mercy.", "topicTags": ["justification", "justice", "propitiation", "Romans 3"], "suggestedHymns": ["Nothing but the Blood", "Rock of Ages", "There Is a Fountain"], "datePublished": "2026-04-05T00:00:00.000Z", "bodyText": "<p>There is a question at the heart of the gospel that most people never stop to ask: How can a holy God forgive sinners and still be just?</p><p>If God simply overlooked sin, He would not be just. If He only punished sin, there would be no hope. Somehow, justice and mercy had to meet. Somehow, sin had to be addressed and sinners had to be saved.</p><p>Paul answers this in Romans 3:24\u201326:</p><blockquote>\"All are justified freely by His grace through the redemption that came by Christ Jesus. God presented Christ as a sacrifice of atonement, through the shedding of His blood \u2014 to be received by faith. He did this to demonstrate His righteousness\u2026 so as to be just and the one who justifies those who have faith in Jesus.\"</blockquote><p>There it is. The cross is where justice and mercy met. At Calvary, God poured out the full penalty for sin \u2014 not on us, but on Christ. Justice was served. The debt was paid. And mercy was extended \u2014 freely, to everyone who puts their faith in Jesus.</p><p>The blood of Christ is not just a symbol. It is the mechanism by which God remains righteous while declaring sinners righteous. Without it, we have no standing before God. With it, we are justified \u2014 declared not guilty \u2014 by the Judge of all the earth.</p><p>That is the power of the blood. It does not merely soothe our conscience. It satisfies God's justice.</p><p>This bread \u2014 a body that absorbed the penalty we deserved.<br>This cup \u2014 blood that made it possible for a holy God to welcome unholy people.</p><p>At this table, justice and mercy embrace. And we are the beneficiaries.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Weight of the Cross", "scripturePassage": "Luke 23:26; Isaiah 53:6", "length": "medium", "summary": "Simon of Cyrene carried the physical cross. But Jesus carried something far heavier \u2014 the sin of the entire world.", "topicTags": ["Simon of Cyrene", "weight of sin", "carrying the cross"], "suggestedHymns": ["Beneath the Cross of Jesus", "Lead Me to Calvary", "The Old Rugged Cross"], "datePublished": "2026-04-12T00:00:00.000Z", "bodyText": "<p>Luke 23:26 records a detail that is easy to read past:</p><blockquote>\"As the soldiers led Him away, they seized Simon from Cyrene, who was on his way in from the country, and put the cross on him and made him carry it behind Jesus.\"</blockquote><p>Jesus had been scourged. His back was torn. His body was failing. And the weight of the crossbeam was more than He could physically bear in that moment. So the soldiers grabbed a stranger from the crowd and forced him to carry it.</p><p>Simon carried the wood. But Jesus carried something heavier.</p><p>Isaiah 53:6 says:</p><blockquote>\"We all, like sheep, have gone astray, each of us has turned to our own way; and the Lord has laid on Him the iniquity of us all.\"</blockquote><p>The iniquity of us <em>all</em>. Every sin of every person who would ever live \u2014 past, present, and future \u2014 was placed on Jesus.</p><p>The cross was heavy. But the sin was heavier. The wood could be shared. The guilt could not.</p><p>No one could help Him carry that. No human could bear even a fraction of it. The Son of God alone had the strength \u2014 and the willingness \u2014 to take it all.</p><p>So when we take the bread this morning, we are not remembering a man who was simply exhausted. We are remembering a Savior who was crushed under the weight of our rebellion \u2014 willingly, lovingly, completely.</p><p>When we take the cup, we are remembering that the blood He shed was the cost of removing that weight from us and placing it on Himself.</p><p>The cross was heavy. But His love was stronger.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "A Better Covenant", "scripturePassage": "Hebrews 8:6; Jeremiah 31:31\u201334", "length": "medium", "summary": "The old covenant pointed forward. The new covenant, sealed by the blood of Jesus, is better in every way \u2014 better promises, a better mediator, and a better sacrifice.", "topicTags": ["new covenant", "Hebrews", "Jeremiah", "better promises"], "suggestedHymns": ["Blessed Assurance", "It Is Well with My Soul", "There Is a Fountain"], "datePublished": "2026-04-19T00:00:00.000Z", "bodyText": "<p>The writer of Hebrews makes a bold claim:</p><blockquote>\"But in fact the ministry Jesus has received is as superior to theirs as the covenant of which He is mediator is superior to the old one, since the new covenant is established on better promises.\" \u2014 Hebrews 8:6</blockquote><p>Better promises. That is what the new covenant offers \u2014 not just a fresh version of the old system, but something fundamentally superior.</p><p>Jeremiah saw it coming. Centuries before Jesus, God spoke through him:</p><blockquote>\"The days are coming, declares the Lord, when I will make a new covenant\u2026 I will put My law in their minds and write it on their hearts. I will be their God, and they will be My people\u2026 For I will forgive their wickedness and will remember their sins no more.\" \u2014 Jeremiah 31:31\u201334</blockquote><p>Under the old covenant, the law was written on stone. Under the new, it is written on hearts.<br>Under the old, sacrifices had to be repeated. Under the new, one sacrifice is sufficient.<br>Under the old, sins were remembered year after year. Under the new, God says, \"I will remember their sins no more.\"</p><p>And the mediator of this new covenant is not Moses. It is Jesus \u2014 the One who not only delivered the terms but paid the price.</p><p>Every time we take the cup, we are participating in that new covenant. Jesus Himself said, \"This cup is the new covenant in My blood.\" His blood is the ink that signed it. His death is the seal that ratified it.</p><p>This bread \u2014 the body of our covenant mediator.<br>This cup \u2014 the blood that established better promises.</p><p>We are not living under the shadow anymore. We are living in the reality. And that reality is built on the finished work of Christ.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Delivered from Darkness", "scripturePassage": "Colossians 1:13\u201314", "length": "medium", "summary": "We have been rescued from the domain of darkness and brought into the kingdom of God's Son. The cross was not just forgiveness \u2014 it was a transfer of kingdoms.", "topicTags": ["deliverance", "kingdom", "darkness", "Colossians"], "suggestedHymns": ["Rescue the Perishing", "Amazing Grace", "A New Creature"], "datePublished": "2026-04-26T00:00:00.000Z", "bodyText": "<p>Paul writes in Colossians 1:13\u201314:</p><blockquote>\"For He has rescued us from the dominion of darkness and brought us into the kingdom of the Son He loves, in whom we have redemption, the forgiveness of sins.\"</blockquote><p>Notice the language. This is not a gentle invitation to change neighborhoods. This is a rescue operation.</p><p>\"Rescued\" implies danger. It implies captivity. It implies that we were in a place we could not escape on our own.</p><p>And that place is called \"the dominion of darkness.\" Not just the presence of darkness \u2014 the <em>dominion</em>. The authority. The rule. We were not just visiting darkness. We were under its power.</p><p>Sin is not a minor inconvenience. It is a kingdom \u2014 and before Christ, we were citizens of it, whether we realized it or not. It shaped our thinking, directed our desires, and determined our destiny.</p><p>But God did not leave us there.</p><p>He rescued us. He transferred us. He moved us from one kingdom to another \u2014 from darkness into the kingdom of His beloved Son.</p><p>And the means of that transfer? \"In whom we have redemption, the forgiveness of sins.\" The blood of Christ is our passport. The cross is the border crossing. And on this side, there is light, life, and belonging.</p><p>So when we gather at this table, we are not just remembering a death. We are celebrating a rescue. We are not just acknowledging our sin. We are proclaiming our deliverance.</p><p>This bread \u2014 the body that broke the chains of darkness.<br>This cup \u2014 the blood that bought our citizenship in the kingdom of light.</p><p>We have been delivered. And we are never going back.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Altar and the Table", "scripturePassage": "Hebrews 13:10\u201312", "length": "medium", "summary": "The writer of Hebrews says we have an altar \u2014 not of stone, but of sacrifice. The Lord's table connects us to the cross where Jesus suffered outside the gate.", "topicTags": ["altar", "sacrifice", "outside the gate", "Hebrews"], "suggestedHymns": ["Beneath the Cross of Jesus", "Near the Cross", "When I Survey the Wondrous Cross"], "datePublished": "2026-05-03T00:00:00.000Z", "bodyText": "<p>The writer of Hebrews makes a striking statement:</p><blockquote>\"We have an altar from which those who minister at the tabernacle have no right to eat.\" \u2014 Hebrews 13:10</blockquote><p>An altar. Not a physical altar made of stone or bronze. But an altar nonetheless \u2014 a place of sacrifice. And that altar is the cross.</p><p>Under the old system, the high priest carried the blood of animals into the Most Holy Place. But the bodies of those sacrificed animals were burned outside the camp. They were taken beyond the boundaries of the community.</p><p>And then comes verse 12:</p><blockquote>\"And so Jesus also suffered outside the city gate to make the people holy through His own blood.\"</blockquote><p>Jesus was not crucified in the temple. He was not sacrificed on a golden altar. He suffered <em>outside the gate</em> \u2014 in a place of rejection, shame, and disgrace.</p><p>That detail matters. It tells us that Jesus entered our exile. He went to the place of cursing. He was cast out \u2014 not because He deserved it, but because we did. He bore our shame in the most public, most humiliating way possible.</p><p>And from that altar \u2014 that rough, bloody, despised cross \u2014 comes our holiness. His blood, shed outside the gate, is what makes us clean.</p><p>So when we gather at this table, we are gathering around that altar. Not a sanitized version of it. Not a comfortable one. The real one \u2014 where the Son of God suffered and bled for our redemption.</p><p>This bread \u2014 a body broken outside the gate.<br>This cup \u2014 blood shed at the altar of the cross.</p><p>We have an altar. And it has changed everything.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Remember and Proclaim", "scripturePassage": "1 Corinthians 11:24\u201326", "length": "medium", "summary": "The Lord's Supper is not passive \u2014 it is an act of proclamation. Every time we eat and drink, we are preaching the gospel without saying a word.", "topicTags": ["remembrance", "proclamation", "preaching the cross", "1 Corinthians 11"], "suggestedHymns": ["Tell Me the Story of Jesus", "I Love to Tell the Story", "We're Marching to Zion"], "datePublished": "2026-05-10T00:00:00.000Z", "bodyText": "<p>Jesus said two words that define this meal: <em>remember</em> and <em>do</em>.</p><blockquote>\"Do this in remembrance of Me.\" \u2014 1 Corinthians 11:24</blockquote><p>But Paul adds something that deepens the act beyond personal reflection:</p><blockquote>\"For whenever you eat this bread and drink this cup, you proclaim the Lord's death until He comes.\" \u2014 1 Corinthians 11:26</blockquote><p>Proclaim. That is not a passive word. It means to declare, to announce, to preach.</p><p>Every time we gather around this table, we are doing more than remembering privately. We are preaching publicly. Without a pulpit. Without a microphone. Without a single word spoken aloud.</p><p>The bread and the cup are a sermon.</p><p>They say to one another: \"His body was given. His blood was shed. And we believe it matters.\"<br>They say to the watching world: \"We are people who have staked our lives on a crucified and risen Lord.\"<br>They say to heaven: \"We have not forgotten.\"</p><p>This is one reason the early church gathered every first day of the week to break bread. It was not routine. It was not ritual. It was proclamation. It was the church, week after week, standing together and declaring: \"Jesus died. Jesus rose. Jesus is coming again.\"</p><p>So this morning, as you take the bread and the cup, know that you are not just receiving \u2014 you are proclaiming. You are joining a declaration that stretches back two thousand years and forward to the day He returns.</p><p>This bread \u2014 a proclamation of a body given.<br>This cup \u2014 a proclamation of a covenant sealed in blood.</p><p>Let the table preach.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "The Mediator", "scripturePassage": "1 Timothy 2:5\u20136; Hebrews 9:15", "length": "medium", "summary": "There is one mediator between God and man \u2014 the man Christ Jesus. At the Lord's table, we remember the only One who could stand between us and a holy God.", "topicTags": ["mediator", "access to God", "1 Timothy", "bridge"], "suggestedHymns": ["I Need Thee Every Hour", "What a Friend We Have in Jesus", "Draw Me Nearer"], "datePublished": "2026-05-17T00:00:00.000Z", "bodyText": "<p>Paul writes in 1 Timothy 2:5\u20136:</p><blockquote>\"For there is one God and one mediator between God and mankind, the man Christ Jesus, who gave Himself as a ransom for all people.\"</blockquote><p>A mediator is someone who stands between two parties to bring them together. In a dispute, a mediator bridges the gap that neither side can cross alone.</p><p>And that is precisely our situation. On one side stands a holy God who cannot tolerate sin. On the other side stand sinful people who cannot remove it. The gap between us is infinite \u2014 and no amount of effort, religion, or good intention can close it.</p><p>But Jesus stands in that gap.</p><p>He is uniquely qualified. He is fully God \u2014 so He can represent the Father. He is fully man \u2014 so He can represent us. And He gave Himself as a ransom \u2014 so the debt between us could be settled.</p><p>Hebrews 9:15 adds:</p><blockquote>\"For this reason Christ is the mediator of a new covenant, that those who are called may receive the promised eternal inheritance \u2014 now that He has died as a ransom to set them free.\"</blockquote><p>His mediation is not ongoing negotiation. It is accomplished fact. He died. The ransom was paid. The covenant was sealed. And the inheritance is ours.</p><p>This table is where we remember the Mediator. Not a distant God we cannot approach. Not a hopeless gap we cannot cross. But a Savior who bridged the divide with His own body and blood.</p><p>This bread \u2014 the body of the One who stood between us and judgment.<br>This cup \u2014 the blood of the Mediator who brought us to God.</p><p>There is one way to the Father. And His name is Jesus.</p><p>Let's remember Him now. Let's pray.</p>"}];
    const substantive1Presentations = [{"title": "The Garden Before the Cross", "scripturePassage": "Matthew 26:36\u201346; Luke 22:44", "length": "substantive", "summary": "Before the nails, before the thorns, before the cross \u2014 there was Gethsemane. Jesus' agony in the garden reveals what the cross would truly cost and the depth of His willingness to pay it.", "topicTags": ["Gethsemane", "agony", "surrender", "will of God"], "suggestedHymns": ["'Tis Midnight and on Olive's Brow", "Lead Me to Calvary", "Into My Heart"], "datePublished": "2026-01-04T00:00:00.000Z", "bodyText": "<p>We often focus on the cross \u2014 and we should. But before we can fully appreciate what happened on Calvary, we need to step into a garden.</p><p>Gethsemane. The name means \"olive press\" \u2014 the place where olives were crushed to produce oil. And on the night before His death, Jesus Himself was crushed there.</p><p>Matthew 26:36\u201338 tells us:</p><blockquote>\"Then Jesus went with His disciples to a place called Gethsemane, and He said to them, 'Sit here while I go over there and pray.' He took Peter and the two sons of Zebedee along with Him, and He began to be sorrowful and troubled. Then He said to them, 'My soul is overwhelmed with sorrow to the point of death. Stay here and keep watch with Me.'\"</blockquote><p>Overwhelmed with sorrow to the point of death. That is not mild distress. That is agony at the edge of human endurance.</p><p>And then He prayed:</p><blockquote>\"My Father, if it is possible, may this cup be taken from Me. Yet not as I will, but as You will.\" \u2014 Matthew 26:39</blockquote><p>What was the cup? It was not simply the physical pain of crucifixion \u2014 though that was brutal beyond description. The cup was the full weight of God's judgment against sin. Every act of rebellion, every moment of wickedness, every stain of guilt from every person who would ever live \u2014 compressed into a single experience and placed on the only One who had never sinned.</p><p>Luke adds a detail that the other Gospels do not:</p><blockquote>\"And being in anguish, He prayed more earnestly, and His sweat was like drops of blood falling to the ground.\" \u2014 Luke 22:44</blockquote><p>Medical science has a name for this \u2014 hematidrosis. Under extreme stress, capillaries near the sweat glands can burst, mixing blood with perspiration. It is rare. It is real. And it tells us that the agony of Gethsemane was not metaphor. It was physical, emotional, and spiritual torment of the highest order.</p><p>And here is what makes the garden so important for us: Jesus could have stopped. He asked the Father if there was another way. He wrestled with the cost. And then \u2014 freely, deliberately, lovingly \u2014 He chose to go forward.</p><p>\"Not as I will, but as You will.\"</p><p>That sentence is the hinge of human history. If Jesus had walked away in the garden, there would be no cross. No blood. No forgiveness. No hope.</p><p>But He didn't walk away.</p><p>He chose you. He chose me. He chose the cup \u2014 the full, undiluted cup of judgment \u2014 so that we would never have to drink it ourselves.</p><p>Three times He prayed. Three times He surrendered. And then He stood up, woke His sleeping disciples, and walked toward the torches of the mob that had come to arrest Him.</p><p>The cross began in the garden. The surrender happened before the nails.</p><p>So as you take the bread this morning, remember that before His body was broken on the cross, His heart was broken in the garden.</p><p>As you take the cup, remember that before He drank the cup of judgment for us, He knelt in the dirt and asked if there was any other way. There wasn't. And He drank it anyway.</p><p>Gethsemane tells us that salvation was not automatic. It was chosen. It was costly. And it was driven by a love so deep that even the prospect of bearing the full wrath of God could not turn it back.</p><p>Let's remember Him now. Let's pray.</p>"}, {"title": "Forsake
