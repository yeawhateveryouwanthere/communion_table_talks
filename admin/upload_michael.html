    const presentations = [{"title": "Begin at the Cross", "scripturePassage": "Lamentations 3:22-23; Romans 5:6-8", "bodyText": "<p><strong>“Begin at the Cross”</strong><br />\n<em>(Lamentations 3:22–23; Romans 5:6–8)</em></p><p>It’s a new year. New calendars, new plans, new challenges—and maybe even a little pressure to get it all right this time.</p><p>But before we step into the rest of the year, let’s take a moment here… at the Lord’s table… to be still.</p><p>Not to make a promise to God, but to remember a promise <em><strong><span class=\"underline\">from</span></strong></em> God.</p><p><em>“Because of the Lord’s great love we are not consumed,<br />\nfor His compassions never fail.<br />\nThey are new every morning;<br />\ngreat is Your faithfulness.”</em><br />\n— Lamentations 3:22–23</p><p>That’s not just a poetic thought for a new year—it’s a reminder of how we made it through the last one. And it’s a reminder of where our hope lies in the one ahead.</p><p>We didn’t survive 2025 by our strength, and we won’t thrive in 2026 by our effort alone.<br />\n<strong>We live because Jesus died.</strong></p><p>Paul writes in <strong>Romans 5:6–8</strong>: <em>“At just the right time, when we were still powerless, Christ died for the ungodly… God demonstrates His own love for us in this: While we were still sinners, Christ died for us.”</em></p><p>So today, as you take the bread and the cup, you’re not making a resolution—you’re receiving a reminder.</p><p>You are loved.<br />\nYou are forgiven.<br />\nYou are new—not because of a calendar, but because of the cross.</p><p>Let’s begin the year where we find grace, peace, and purpose.<br />\nLet’s begin <strong>at the cross</strong>.</p><p>Let’s pray.</p>", "summary": "A new year reflection reminding us that we are made new not by resolutions but by the cross. God's mercies are new every morning, and our hope rests in Christ's sacrifice.", "topicTags": ["New Year", "Grace", "God's Faithfulness", "New Beginnings", "Hope"], "length": "brief", "suggestedHymns": ["Great Is Thy Faithfulness", "At the Cross", "The Old Rugged Cross"], "datePublished": "2026-01-04T00:00:00.000"}, {"title": "Born to Die", "scripturePassage": "Philippians 2:6-8; Luke 19:10", "bodyText": "<p><strong>“Born to Die”</strong><br />\n<em>(Philippians 2:6–8; Luke 19:10)</em></p><p>This is Christmas week, and it’s one of the few times each year when the world still pauses—if only for a moment—to think about Jesus.</p><p>They’ll picture Him as a baby in a manger.<br />\nThey’ll sing songs about peace on earth and goodwill toward men.<br />\nThey might even set out a nativity scene and talk about how He came to bring hope.</p><p>But Scripture takes us deeper than sentiment.</p><p>Jesus didn’t come just to be admired.<br />\nHe came to be <strong>offered</strong>.</p><p>Listen to what Paul says in Philippians 2:6–8: <em>“Though He was in the form of God, He did not count equality with God a thing to be grasped, but emptied Himself, taking the form of a servant… and being found in human form, He humbled Himself by becoming obedient to the point of death—even death on a cross.”</em></p><p>The miracle isn’t just that God came near.<br />\nThe miracle is what He came <strong>to do</strong>.</p><p>In Luke 19:10, Jesus said: <em>“The Son of Man came to seek and to save the lost.”</em></p><p>That’s why we gather at this table.</p><p>Not to remember a manger—but a <strong>sacrifice</strong>.<br />\nNot to honor a birth—but a <strong>death that gives life</strong>.<br />\nNot just to feel good—but to be made whole.</p><p>So as the world sings of silent nights and candlelight, we gather to remember <strong>a dark day</strong>—when Jesus gave His body and shed His blood for us.</p><p>This bread—His body, willingly given.<br />\nThis cup—His blood, poured out for our sins.<br />\nThis table—our reminder that the baby in the manger is the Lamb on the cross.</p><p>He was born… <strong>to die</strong>.<br />\nSo that we might live.</p><p>Let’s pray.</p>", "summary": "A Christmas-season reminder that Jesus didn't come just to be admired as a baby—He came to be offered as a sacrifice. The manger always pointed to the cross.", "topicTags": ["Christmas", "Incarnation", "Sacrifice", "Humility of Christ", "Salvation"], "length": "brief", "suggestedHymns": ["Away in a Manger", "O Come O Come Emmanuel", "What Child Is This"], "datePublished": "2025-12-21T00:00:00.000"}, {"title": "Father, Forgive Them", "scripturePassage": "Luke 23:34; Isaiah 53:12", "bodyText": "<p><strong>“Father, Forgive Them”</strong></p><p><em>(Luke 23:34; Isaiah 53:12)</em></p><p>As we prepare to take the Lord’s Supper this morning, I want us to listen to the very first words Jesus spoke from the cross.</p><p>Luke 23:34 records them: “Father, forgive them, for they know not what they do.”</p><p>Think about when He said that. The nails had just been driven through His hands and feet.<br />\nThe cross had been lifted into place. The crowd was mocking. The soldiers were gambling for His garments.</p><p>And in that moment, before the pain subsided, before anyone repented, before anyone asked, Jesus prayed for forgiveness.</p><p>Not for His own relief. Not for deliverance. But for those who were crucifying Him.</p><p>“Father, forgive them.”</p><p>Isaiah had prophesied this centuries earlier: “He bore the sin of many, and makes intercession for the transgressors.” (Isaiah 53:12)</p><p>Even as He was dying, He was interceding. And here is the part that should humble us: We were not physically present at Calvary — but our sins were.</p><p>The pride. The dishonesty. The selfishness. The lust. The anger. The rebellion.</p><p>Every sin that required a Savior was laid upon Him.</p><p>And yet His first words were not condemnation — but mercy. “Father, forgive them.”</p><p>That is what this table represents. The bread reminds us that His body endured the punishment. The cup reminds us that His blood secured the pardon.</p><p>We do not come to this table because we deserve it. We come because forgiveness has been extended to us at tremendous cost.</p><p>And every time we take the Lord’s Supper, we are remembering that forgiveness is not cheap. It required a cross. It required blood. It required the Son of God praying for sinners while He suffered in their place.</p><p>So as you hold the bread this morning, remember that His body bore your sin. As you take the cup, remember that His blood purchased your forgiveness. And hear again those words spoken across the centuries — words that still apply to all who come to Him in faith and obedience: “Father, forgive them.”</p><p>Let’s remember Him now. Let’s pray.</p>", "summary": "Focusing on the first words Jesus spoke from the cross—a prayer for forgiveness for those crucifying Him. His mercy extended before anyone asked, and the cost of that forgiveness is what this table represents.", "topicTags": ["Forgiveness", "Words from the Cross", "Mercy", "Intercession", "Cost of Salvation"], "length": "medium", "suggestedHymns": ["Amazing Grace", "There Is a Fountain", "At Calvary"], "datePublished": "2025-08-03T00:00:00.000"}, {"title": "Fix Your Eyes on Jesus", "scripturePassage": "Hebrews 12:1-3", "bodyText": "<p><strong>“Fix Your Eyes on Jesus”</strong><br />\n<em>(Hebrews 12:1–3)</em></p><p>It’s easy to lose focus.</p><p>Maybe you started this year with good intentions—spiritually, physically, relationally. But already, the momentum is fading. Life is busy. Goals are slipping. And your walk with God might feel like it’s already stumbling.</p><p>That’s why this moment—this table—matters so much.</p><p>It brings our attention back to the one thing that truly sustains us: <strong>the cross of Christ.</strong></p><p>Hebrews 12:1–3 says:</p><p><em>“Let us run with endurance the race that is set before us,<br />\n<strong>fixing our eyes on Jesus</strong>, the pioneer and perfecter of our faith.<br />\nFor the joy set before Him He endured the cross, scorning its shame,<br />\nand sat down at the right hand of the throne of God.<br />\nConsider Him who endured such opposition from sinners,<br />\nso that you will not grow weary and lose heart.”</em></p><p>We come to this table today to <strong>fix our eyes on Jesus</strong>.</p><ul><li><p>Not on our failures.</p></li><li><p>Not on our to-do lists.</p></li><li><p>Not on what we haven’t become yet.</p></li><li><p>But on the One who <em>finished</em> what we could never do.</p></li></ul><p>He endured the cross—for the joy of redeeming you.</p><p>So take this bread, and remember His body—given for you.<br />\nTake this cup, and remember His blood—poured out so you could be forgiven.<br />\nAnd let this meal strengthen you to <strong>keep running</strong>, not by your own power, but by looking to the One who endured everything for you.</p><p>Fix your eyes on Jesus.</p><p>Let’s pray.</p>", "summary": "When focus fades and momentum slips, the Lord's table brings our attention back to the cross. Jesus endured everything for the joy of redeeming us, and this meal strengthens us to keep running.", "topicTags": ["Perseverance", "Focus", "Endurance", "Race of Faith", "Encouragement"], "length": "brief", "suggestedHymns": ["Turn Your Eyes Upon Jesus", "Be Thou My Vision", "My Faith Looks Up to Thee"], "datePublished": "2026-01-18T00:00:00.000"}, {"title": "He Was Numbered with the Transgressors", "scripturePassage": "Isaiah 53:12; Luke 22:37; 2 Corinthians 5:21", "bodyText": "<p><strong>“He Was Numbered with the Transgressors”</strong><br />\n<em>(Isaiah 53:12; Luke 22:37)</em></p><p>As we prepare our hearts to take the Lord’s Supper this morning, I want to draw your attention to a detail of the crucifixion that might be easy to overlook—but Jesus didn’t.</p><p>In Luke 22:37, on the very night of His betrayal, Jesus said to His disciples: <em>“For I tell you that this Scripture must be fulfilled in Me: ‘And He was numbered with the transgressors.’ For what is written about Me has its fulfillment.”</em></p><p>He was quoting from Isaiah 53—a chapter He knew by heart. A chapter that described His rejection, suffering, and death in such detail that it reads more like a biography than a prophecy.</p><p>And Jesus zeroes in on this phrase: <em>“He was numbered with the transgressors.”</em> (Isaiah 53:12) Think about that. The spotless Lamb of God—holy, innocent, without sin—was counted as a lawbreaker.</p><p>He was crucified between two thieves. Mocked by the crowd. Rejected by the leaders. Treated like a criminal. And in His final breath, He cried out the words of Psalm 22: <em>“My God, My God, why have You forsaken Me?”</em></p><p>Why? Not because He had sinned. But because <strong>we had.</strong></p><p>He was <strong>numbered with the transgressors</strong> so that <em>we</em> could be counted among the redeemed.</p><p>Paul said it like this in 2 Corinthians 5:21: <em>“God made Him who had no sin to be sin for us, so that in Him we might become the righteousness of God.”</em></p><p>That’s what we remember at this table.</p><p>The bread is not just bread—it’s a reminder of a body broken in our place.</p><p>The cup is not just juice—it’s a reminder of blood poured out, not for His own guilt, but for ours.</p><p>Jesus didn’t <em>deserve</em> to be numbered with sinners. <strong>But He chose to be.</strong> So that you and I could have a place in the family of God.</p><p>As you take the Lord’s Supper today, don’t just remember the pain of the cross. Remember the <strong>exchange</strong> that happened there. The sinless was treated like a sinner, so that sinners could be treated as sons and daughters.</p><p>Let’s take this moment to remember Him.</p><p>Let’s pray.</p>", "summary": "Jesus Himself pointed to Isaiah's prophecy that He would be counted among sinners. He was crucified between thieves—the sinless one treated as a lawbreaker so that we could be counted among the redeemed.", "topicTags": ["Substitution", "Prophecy Fulfilled", "Isaiah 53", "Imputed Righteousness", "The Great Exchange"], "length": "medium", "suggestedHymns": ["Man of Sorrows", "Hallelujah What a Savior", "Beneath the Cross of Jesus"], "datePublished": "2025-09-07T00:00:00.000"}, {"title": "In My Place", "scripturePassage": "Isaiah 53:5-6; 2 Corinthians 5:21", "bodyText": "<p><strong>“In My Place”</strong><br />\n<em>(Isaiah 53:5–6; 2 Corinthians 5:21)</em></p><p>There’s a simple phrase that sums up the meaning of the cross in just three words: <strong>In my place.</strong></p><p>That’s what we remember at this table.</p><p>Jesus didn’t just die.<br />\nHe died <strong>in my place</strong>.<br />\nHe didn’t just suffer.<br />\nHe suffered <strong>for me</strong>—so I wouldn’t have to bear the weight of my own guilt.</p><p>Isaiah 53 says it clearly:</p><p><em>“He was pierced for our transgressions,<br />\nHe was crushed for our iniquities;<br />\nthe punishment that brought us peace was on Him,<br />\nand by His wounds we are healed…<br />\nand the Lord has laid on Him the iniquity of us all.”</em><br />\n— Isaiah 53:5–6</p><p>That’s substitution.</p><p>He took what I deserved… and gave me what <strong>He</strong> deserved.</p><p>Paul puts it this way in 2 Corinthians 5:21:</p><p><em>“God made Him who had no sin to be sin for us,<br />\nso that in Him we might become the righteousness of God.”</em></p><p>So as we take the bread this morning, we remember:<br />\nHis body was broken <strong>in our place</strong>.</p><p>As we drink the cup, we remember:<br />\nHis blood was poured out <strong>for our sins</strong>.</p><p>We don’t come to this table as perfect people.<br />\nWe come as grateful people—redeemed, cleansed, and free…<br />\n<strong>Because Jesus stood in our place.</strong></p><p>Let’s remember Him now.</p><p>Let’s pray.</p>", "summary": "Three words that sum up the meaning of the cross: in my place. Jesus took what we deserved and gave us what He deserved. We come to this table not as perfect people, but as grateful ones.", "topicTags": ["Substitutionary Atonement", "Grace", "Gratitude", "Freedom", "Redemption"], "length": "brief", "suggestedHymns": ["In My Place", "Jesus Paid It All", "Nothing but the Blood"], "datePublished": "2025-07-06T00:00:00.000"}, {"title": "It Is Finished", "scripturePassage": "John 19:28-30; Hebrews 10:12-14", "bodyText": "<p><strong>“It Is Finished”</strong></p><p><em>(John 19:28–30; Hebrews 10:12–14)</em></p><p>As we prepare to take the Lord’s Supper this morning, I want us to focus on three words that were spoken from the cross. Three words that changed everything.</p><p>In John 19:30, after hours of agony, after the darkness, after the mocking and the nails and the thirst, Jesus cried out: “It is finished.” And then He bowed His head and gave up His spirit.</p><p>Those words were not a whisper of defeat. They were a declaration of completion.</p><p>The Greek word Jesus used means “paid in full.” It was written across receipts when a debt had been satisfied. Nothing left owing. Nothing left outstanding.</p><p>When Jesus said, “It is finished,” He meant that the work the Father had given Him to do was complete.</p><p>The law had exposed sin. The sacrifices had pointed forward. The prophets had promised redemption. And now, at the cross, the payment was made.</p><p>Hebrews 10:12–14 explains what that means for us: “But when Christ had offered for all time a single sacrifice for sins, He sat down at the right hand of God… For by a single offering He has perfected for all time those who are being sanctified.”</p><p>Under the old covenant, priests stood daily. Their work was never done. Sacrifice after sacrifice. Blood after blood. Reminder after reminder that sin was still there.</p><p>But Jesus offered one sacrifice — Himself. And then He sat down. Because it was finished.</p><p>So when we take the bread this morning, we are not adding to His work. When we drink the cup, we are not completing something unfinished. We are remembering a sacrifice that was sufficient.</p><p>That means your forgiveness does not depend on how well you performed this week. It does not rise and fall with your emotions. It does not depend on how strongly you feel in this moment. Instead, it rests on a finished work of Christ and your acceptance of God’s grace in obeying the gospel.</p><p>His body was given. His blood was shed. The debt was paid. And when Jesus said, “It is finished,” He meant it.</p><p>So come to this table not anxious, but grateful. Not trying to earn, but remembering what has already been accomplished.</p><p>Let’s remember Him now. Let’s pray.</p>", "summary": "Three words from the cross that changed everything. 'It is finished' was not defeat but a declaration of completion—the debt paid in full. Our forgiveness rests on a finished work, not our weekly performance.", "topicTags": ["Finished Work of Christ", "Sufficiency", "Words from the Cross", "Rest", "Assurance"], "length": "medium", "suggestedHymns": ["It Is Well with My Soul", "Jesus Paid It All", "The Old Rugged Cross"], "datePublished": "2025-06-01T00:00:00.000"}, {"title": "He Gave Himself for Me", "scripturePassage": "Galatians 2:20", "bodyText": "<p><strong>Lord’s Supper Reflection: He Gave Himself for Me</strong> <em>(Galatians 2:20)</em></p><p>As we come to the Lord’s Supper this morning, I want to invite you to take a moment to make this very personal.</p><p>Not just a tradition.<br />\nNot just a piece of bread or a small cup of juice.<br />\nBut a moment to reflect on this truth: <strong>Jesus gave Himself for <em><span class=\"underline\">you</span></em>.</strong></p><p>Listen to the words of Galatians 2:20:</p><p><em>“I have been crucified with Christ and I no longer live, but Christ lives in me.<br />\nThe life I now live in the body, I live by faith in the Son of God, <strong>who loved me and gave Himself for me</strong>.”</em></p><p>The cross was not just something Jesus did for the world in general—it was something He did for <em><span class=\"underline\">you</span></em> in particular.</p><p>We often say things like, “Jesus died for our sins,” and that’s true—but it’s easy for that to feel abstract. General. Distant.<br />\nBut Paul doesn’t speak generally here. He says: <strong>“He loved me. He gave Himself for me.”</strong></p><p>Make that your meditation this morning. Say it quietly in your heart: “He gave Himself for <em>me</em>.”</p><p>All my guilt. All my shame. All my wandering. All my pride.<br />\nJesus saw it all—and didn’t flinch.<br />\nHe didn’t hold back.<br />\nHe didn’t negotiate.<br />\nHe didn’t demand that I clean myself up first.<br />\n<strong>He gave Himself. Fully. Willingly. Lovingly.</strong></p><p>And He didn’t do it because we were lovable. He did it because He <em>loved us anyway</em>.</p><p>So as you hold the bread in your hand this morning, and the cup to your lips—don’t just think of the cross in general. Think of <em>your</em> sin. <em>Your</em> story. <em>Your</em> salvation.</p><p>And then think of <em>His</em> love.</p><p>“The Son of God… who loved me… and gave Himself for me.”</p><p>Let’s pray.</p><p>BREAD: Lord, thanks for the bread to which Christ said, “This my body which is broken for you. Do this in remembrance of me.” May we do exactly that. In Christ’s name, amen.</p><p>FRUIT OF THE VINE: Lord, thanks for the fruit of the vine to which Christ said, “This my blood of the new covenant which is shed for many for the remission of sins. Do this in remembrance of me.” Again, we pray that we do exactly that. In Christ’s name, amen.</p>", "summary": "Making the cross personal. Paul didn't speak generally—he said 'He loved me and gave Himself for me.' This meditation invites each person to receive the sacrifice not as abstract truth but as deeply personal love.", "topicTags": ["Personal Salvation", "Love of Christ", "Identity in Christ", "Galatians", "Devotion"], "length": "medium", "suggestedHymns": ["When I Survey the Wondrous Cross", "I Gave My Life for Thee", "Love Lifted Me"], "datePublished": "2025-10-05T00:00:00.000"}, {"title": "Love That Bled", "scripturePassage": "1 John 4:9-10; John 15:13", "bodyText": "<p><strong>“Love That Bled”</strong></p><p><em>(1 John 4:9–10; John 15:13)</em></p><p>Yesterday was Valentine’s Day, a day when our culture talks a great deal about love.</p><p>Cards are exchanged. Flowers are given. People express affection and appreciation for those who matter most to them.</p><p>And that’s not a bad thing. Love is a beautiful gift from God.</p><p>But as we gather around this table, we are reminded of a love that is deeper than romance, stronger than emotion, and more costly than any gift that could ever be wrapped.</p><p>John writes in 1 John 4:9–10: “In this the love of God was made manifest among us, that God sent His only Son into the world, so that we might live through Him.<br />\nIn this is love, not that we have loved God but that He loved us and sent His Son to be the propitiation for our sins.”</p><p>Notice how John defines love. Not by feelings. Not by words Not even by good intentions.</p><p>Love is defined by substitution. By sacrifice. By atonement.</p><p>He loved us, and sent His Son to be the propitiation for our sins. That word means satisfaction, the turning away of wrath. The absorbing of judgment. The settling of a debt we could never pay. That is love.</p><p>Jesus Himself said in John 15:13: “Greater love has no one than this, that someone lay down his life for his friends.” And that is exactly what He did.</p><p>When we take this bread, we are not remembering a vague concept of love. We are remembering a body that was scourged, nailed, and pierced.</p><p>When we drink this cup, we are not participating in sentiment. We are remembering blood that was poured out — not symbolically, but historically — on a cross outside Jerusalem.</p><p>This table reminds us that love is not proven by how much someone feels, but by how much someone is willing to suffer for the good of another.</p><p>And Christ suffered fully. He did not hold back. He did not withdraw when the cost became clear. He loved — and that love bled.</p><p>So as you take the bread and the cup today, let your heart rest in this truth: You are not loved in theory. You are loved in blood.</p><p>Let’s remember Him now. Let’s pray.</p>", "summary": "A Valentine's Day reflection on a love deeper than romance—love defined not by feelings but by substitution, sacrifice, and atonement. Christ's love didn't just feel; it bled.", "topicTags": ["Love of God", "Valentine's Day", "Propitiation", "Sacrifice", "Atonement"], "length": "medium", "suggestedHymns": ["O the Deep Deep Love of Jesus", "My Jesus I Love Thee", "The Love of God"], "datePublished": "2026-02-15T00:00:00.000"}, {"title": "More Than a Baby", "scripturePassage": "John 1:29; 1 Timothy 1:15", "bodyText": "<p><strong>“More Than a Baby”</strong><br />\n<em>(John 1:29; 1 Timothy 1:15)</em></p><p>In December, many minds are on Jesus. But not the Jesus on the cross— The Jesus in the manger.</p><p>The world is more comfortable with Him that way: Small. Gentle. Quiet.<br />\nA baby who doesn’t demand anything.<br />\nA symbol of peace without the blood of the cross.</p><p>But we know better.</p><p>The Bible doesn’t ask us to remember His birth.<br />\nBut it does command us to remember <strong>His sacrifice</strong>.</p><p>In <strong>John 1:29</strong>, when John the Baptist first saw Jesus, he didn’t say, <em>“Behold, the baby in the manger.”</em> He said: <em>“Behold, the Lamb of God who takes away the sin of the world.”</em></p><p>That’s who He is.<br />\nThat’s why He came.</p><p>Paul put it this way in <strong>1 Timothy 1:15</strong>: <em>“Here is a trustworthy saying that deserves full acceptance: Christ Jesus came into the world to save sinners…”</em></p><p>That was the mission.<br />\nNot just to be born.<br />\nNot just to teach or heal.<br />\nBut to save.</p><p>And that mission would lead Him to the cross—where His body was broken, and His blood poured out.</p><p>So as the world turns its attention to baby Jesus this season, we gather around this table to remember the <strong>Lamb</strong>.</p><p>This bread—His body.<br />\nThis cup—His blood.<br />\nThis meal—our reminder.</p><p>He is more than a baby.<br />\nHe is our Savior.</p><p>Let’s remember Him now, just as He asked.</p><p>Let’s pray.</p>", "summary": "The world is comfortable with Jesus as a baby in a manger, but Scripture commands us to remember His sacrifice. He came not just to be born but to save—He is the Lamb of God, not merely a Christmas figure.", "topicTags": ["Christmas", "Lamb of God", "Mission of Christ", "Salvation", "Incarnation"], "length": "brief", "suggestedHymns": ["O Come All Ye Faithful", "Hark the Herald Angels Sing", "Joy to the World"], "datePublished": "2025-12-14T00:00:00.000"}, {"title": "New Year, Same Cross", "scripturePassage": "2 Corinthians 5:17; Galatians 6:14", "bodyText": "<p><strong>“New Year, Same Cross”</strong><br />\n<em>(2 Corinthians 5:17; Galatians 6:14)</em></p><p>It’s the first Sunday of a new year.</p><p>There’s something about turning the calendar page that makes us think about starting fresh. So, we set goals. Make resolutions. Try to leave old habits behind. We want to do better, be better, start new.</p><p>But here at the Lord’s table, we’re reminded of something deeper than any New Year’s resolution: We are not made new by trying harder. We are made new by the cross.</p><p>Paul writes in <strong>2 Corinthians 5:17</strong>: <em>“If anyone is in Christ, he is a new creation;<br />\nthe old has passed away; behold, the new has come.”</em></p><p>This table isn’t about good intentions. It’s about <strong>grace</strong>.</p><p>It’s not about who we promise to become. It’s about what Jesus has already done.</p><p>Paul said in <strong>Galatians 6:14</strong>: <em>“Far be it from me to boast except in the cross of our Lord Jesus Christ…”</em></p><p>So as we take the bread and the cup today, we start this new year the best way possible:</p><ul><li><p>Not with boasting, but with humility.</p></li><li><p>Not with pressure, but with peace.</p></li><li><p>Not with self-focus, but with <strong>Christ at the center</strong>.</p></li></ul><p>Because no matter what this year brings—joy or sorrow, success or struggle—the cross will still be here.</p><p>Still faithful.<br />\nStill powerful.<br />\nStill the place where new life begins.</p><p>Let’s remember the One who makes all things new.</p><p>Let’s pray.</p>", "summary": "We aren't made new by resolutions or trying harder—we are made new by the cross. As one year ends and another begins, the cross remains faithful, powerful, and the place where new life begins.", "topicTags": ["New Year", "New Creation", "Grace vs. Works", "The Cross", "Identity in Christ"], "length": "brief", "suggestedHymns": ["The Old Rugged Cross", "At the Cross", "Near the Cross"], "datePublished": "2026-01-04T00:00:00.000"}, {"title": "Still Thankful", "scripturePassage": "Hebrews 13:15; Revelation 5:9", "bodyText": "<p><strong>“Still Thankful”</strong><br />\n<em>(Hebrews 13:15; Revelation 5:9)</em></p><p>Thanksgiving week has come and gone.<br />\nThe meals have been shared, the desserts devoured, and the decorations might already be coming down.<br />\nBut here’s the question I want to ask this morning:</p><p><strong>Now that Thanksgiving is over… are we still thankful?</strong></p><p>Not for food or family—though those are blessings.<br />\nNot for a short work week or Black Friday deals.<br />\nBut thankful for <strong>what never changes.</strong></p><p>Listen to this from Hebrews 13:15: <em>“Through Jesus, therefore, let us continually offer to God a sacrifice of praise— the fruit of lips that openly profess His name.”</em></p><p>Not seasonally.<br />\nNot occasionally.<br />\n<strong>Continually.</strong></p><p>And why do we praise continually? Because the cross is a gift that never stops giving.</p><p>It’s not a once-a-year celebration. It’s an everyday reality.</p><p>In <strong>Revelation 5:9</strong>, the worship in heaven sounds like this:</p><p><em>“Worthy are You… for You were slain, and by Your blood You ransomed people for God…”</em></p><p>That’s the heart of our thankfulness.<br />\nThat’s the reason we gather at this table week after week.<br />\nBecause Jesus was slain. And we were redeemed.</p><p>So even as the world moves on from the season of gratitude…<br />\nEven when the pace picks up and the calendars fill…<br />\nWe pause.<br />\nWe remember.<br />\nAnd we give thanks—not because it’s a holiday, but because it’s <strong>holy</strong>.</p><p>The bread reminds us: His body was given for us.<br />\nThe cup reminds us: His blood was shed for us.<br />\nAnd our hearts respond: “Worthy is the Lamb who was slain.”</p><p>Let’s not let our gratitude fade with the season.</p><p>Let’s pray.</p>", "summary": "Thanksgiving may be over, but true thankfulness doesn't fade with the season. The cross is a gift that never stops giving, and 'Worthy is the Lamb' is the anthem of heaven—and the heartbeat of this table.", "topicTags": ["Thanksgiving", "Gratitude", "Worship", "Praise", "Worthy Is the Lamb"], "length": "brief", "suggestedHymns": ["To God Be the Glory", "Count Your Blessings", "Worthy Is the Lamb"], "datePublished": "2025-11-30T00:00:00.000"}, {"title": "The Constant at the Table", "scripturePassage": "Hebrews 13:8; 1 Peter 1:18-19", "bodyText": "<p><strong>“The Constant at the Table”</strong><br />\n<em>(Hebrews 13:8; 1 Peter 1:18–19)</em></p><p>This is the last Sunday of the year.</p><p>For some, that means looking back—with gratitude, maybe with a little regret, or with relief that it’s almost over.<br />\nFor others, it means looking forward—setting goals, making resolutions, or just hoping next year will be better than this one.</p><p>But in this moment, at this table, we don’t look backward or forward.</p><p>We look to Jesus.</p><p><em>“Jesus Christ is the same yesterday and today and forever.”</em> — Hebrews 13:8</p><p>That’s the anchor for our hearts.</p><p>Because time marches on. Circumstances change. People come and go.<br />\nBut the cross? It remains.</p><p>1 Peter 1:18–19 says: <em>“You were redeemed… not with silver or gold… but with the precious blood of Christ, a lamb without blemish or defect.”</em></p><p>That hasn’t changed. And it never will.</p><p>So as we take the bread and the cup this morning, let’s remember:</p><ul><li><p>His body was given for you this year—and it will still cover you next year.</p></li><li><p>His blood was poured out for the forgiveness of your sins—past, present, and future.</p></li></ul><p>At this table, we find the one thing that never shifts, never expires, never weakens.</p><p>We find the Lamb of God, still faithful. Still willing. Still saving.</p><p>So as one year ends and another begins, let your heart rest here:<br />\nJesus Christ—crucified for you.<br />\nAnd He is the same… yesterday, today, and forever.</p><p>Let’s pray.</p>", "summary": "As the year ends and change swirls around us, the cross remains. Jesus Christ is the same yesterday, today, and forever. At this table we find the one thing that never shifts, expires, or weakens.", "topicTags": ["End of Year", "Faithfulness of Christ", "Unchanging God", "Redemption", "Anchor"], "length": "brief", "suggestedHymns": ["Great Is Thy Faithfulness", "Abide with Me", "How Firm a Foundation"], "datePublished": "2025-12-28T00:00:00.000"}, {"title": "The Cup Jesus Chose", "scripturePassage": "Luke 22:42; 1 Corinthians 10:16", "bodyText": "<p>As we prepare to share in the Lord’s Supper, let’s go back to a quiet garden—Gethsemane—on the night Jesus was betrayed.</p><p>It was there, just hours before the cross, that Jesus knelt to pray. The Gospels tell us He was overwhelmed with sorrow, even to the point of death. And He prayed these words:</p><p><em>“Father, if You are willing, take this cup from Me.<br />\nYet not My will, but Yours be done.”</em> (Luke 22:42)</p><p>What was the cup Jesus asked to be taken away?</p><p>It wasn’t the physical pain—though the cross was brutal.<br />\nIt wasn’t just the betrayal—though that stung deeply.<br />\nThe cup was <strong>the full wrath of God against sin.</strong><br />\n<strong>Our sin.</strong></p><p>It was the punishment we deserved. The separation we earned. The shame we should have borne.</p><p>And Jesus looked into that cup… and said, “Father, if there’s any other way…”</p><p>But there <em>wasn’t</em>.<br />\nSo He drank it.</p><p><strong>To the bottom.</strong></p><p>He took the cup of judgment, so that we could lift the cup of salvation.</p><p>And now, at this table, we drink a different cup.</p><p>Paul calls it <em>“the cup of blessing”</em> in 1 Corinthians 10:16.<br />\nJesus said, <em>“This cup is the new covenant in My blood.”</em></p><p>This cup we hold—simple as it is—represents everything Jesus went through to save us. The agony. The surrender. The obedience. The love.</p><p>So today, as you hold the cup in your hand, remember:<br />\nBefore we ever chose Him… <strong>He chose the cross.</strong><br />\nBefore we ever lifted this cup… <strong>He drank His.</strong></p><p>Let that truth settle in your heart.</p><p>And then, take the bread and the cup with gratitude—not just remembering His death, but honoring His choice.</p><p>Let’s pray.</p>", "summary": "In Gethsemane, Jesus asked the Father to take the cup—the full wrath of God against sin. But He drank it to the bottom so that we could lift the cup of blessing. Before we ever chose Him, He chose the cross.", "topicTags": ["Gethsemane", "Cup of Wrath", "Obedience", "Surrender", "Love of Christ"], "length": "brief", "suggestedHymns": ["Tis Midnight and on Olives Brow", "Go to Dark Gethsemane", "I Surrender All"], "datePublished": "2025-05-04T00:00:00.000"}, {"title": "The Greatest Thanks", "scripturePassage": "Colossians 1:12-14; 2 Corinthians 9:15", "bodyText": "<p><strong>“The Greatest Thanks”</strong><br />\n<em>(Colossians 1:12–14)</em></p><p>This week, many of us will sit down at tables overflowing with food, surrounded by family and friends, and we’ll pause to say <strong>thank you</strong>.</p><p>We’ll thank God for jobs, for health, for safety, for the blessings of the year. And that’s good—we <em>should</em> be thankful.</p><p>But as we come to <em>this</em> table—the Lord’s table—we remember something that matters more than all of those things put together.</p><p><strong>We remember the cross.</strong></p><p>Because no matter how this year has gone for you—whether it’s been full of joy or full of struggle—this truth still stands:</p><p><strong>Jesus died for you.<br />\nAnd He rose again to give you life.</strong></p><p>Paul wrote in <strong>Colossians 1:12–14</strong>:</p><p><em>“Giving thanks to the Father, who has qualified you to share in the inheritance of the saints in light.<br />\nHe has delivered us from the domain of darkness and transferred us to the kingdom of His beloved Son,<br />\nin whom we have redemption, the forgiveness of sins.”</em></p><p>That’s the greatest blessing of all.</p><p>Not just that God gives us things…<br />\nBut that God gave us <strong>Himself.</strong></p><p>He delivered us.<br />\nHe redeemed us.<br />\nHe forgave us.</p><p>And all of that is possible because Jesus willingly went to the cross—His body broken, His blood poured out—<strong>so that you and I could sit at this table today not as strangers, but as sons and daughters.</strong></p><p>So yes, enjoy the turkey this week. Give thanks for the good things in your life.</p><p>But right now, in this moment, as we eat this bread and drink this cup…<br />\nLet your heart give thanks for <em>this</em>:</p><p>“Thanks be to God for His indescribable gift.”<br />\n<em>(2 Corinthians 9:15)</em></p><p>Let’s pray.</p>", "summary": "At Thanksgiving, we count many blessings—but the greatest is the cross. God didn't just give us things; He gave us Himself. He delivered, redeemed, and forgave us through His indescribable gift.", "topicTags": ["Thanksgiving", "Gratitude", "Redemption", "Deliverance", "Gift of God"], "length": "brief", "suggestedHymns": ["Give Thanks", "To God Be the Glory", "Thank You Lord"], "datePublished": "2025-11-23T00:00:00.000"}, {"title": "The Man in the Middle", "scripturePassage": "Luke 23:33; 1 Peter 2:24", "bodyText": "<p><strong>“The Man in the Middle”</strong></p><p><em>(Luke 23:33; 1 Peter 2:24)</em></p><p>As we prepare our hearts to take the Lord’s Supper this morning, I want you to picture the scene at Calvary.</p><p>Luke 23:33 says: “And when they came to the place that is called The Skull, there they crucified Him, and the criminals, one on His right and one on His left.”</p><p>Three crosses stood on that hill. Two criminals. And in the middle Jesus.</p><p>That detail is not accidental.</p><p>Jesus was crucified between two guilty men. From a distance, you could not tell which one was the innocent one. He was numbered with transgressors. Treated like one of them. Executed as one of them. And yet He was the only sinless man who had ever lived.</p><p>Why the middle cross? Maybe it’s because that is where He chose to stand, in-between sinners and the judgment they deserved. He stood between holy justice and guilty humanity.</p><p>Peter explains what happened there in 1 Peter 2:24: “He Himself bore our sins in His body on the tree, that we might die to sin and live to righteousness. By His wounds you have been healed.”</p><p>Notice the language — “He Himself.” No substitute for Him. No one sharing the burden. No partial payment. He bore our sins.</p><p>The criminals on either side were dying for their own crimes. Jesus was dying for ours.</p><p>One of those men mocked Him. The other pleaded for mercy. And in that moment, the man in the middle became the dividing line.</p><p>That is still true today. Every person must decide what to do with the man in the middle.</p><p>But this morning, we are not here to judge others. We are here to remember what He did for us.</p><p>This bread reminds us that His body absorbed the weight of our rebellion. This cup reminds us that His blood was poured out so that our guilt could be washed away.</p><p>The middle cross was not a tragic accident of history. It was the deliberate plan of God — that His Son would stand in the gap, take the punishment, and open the way for sinners to come home.</p><p>As you take the bread and the cup this morning, remember the man in the middle. He was there because of our sin. He was there because of God’s love. He was there so that we would not have to stand there ourselves.</p><p>Let’s remember Him now. Let’s pray.</p>", "summary": "Three crosses on Calvary—two criminals and Jesus in the middle. The middle cross was no accident; it was God's plan for His Son to stand in the gap between holy justice and guilty humanity.", "topicTags": ["Calvary", "Substitution", "Two Thieves", "Gap Between God and Man", "Deliberate Plan of God"], "length": "substantive", "suggestedHymns": ["Were You There", "Beneath the Cross of Jesus", "The Old Rugged Cross"], "datePublished": "2025-04-06T00:00:00.000"}, {"title": "The Only Son", "scripturePassage": "Genesis 22; John 3:16; Romans 8:32", "bodyText": "<p><strong>Lord’s Supper Refection: The Only Son-- From Mount Moriah to Mount Calvary</strong><br />\n<em>(Genesis 22 &amp; John 3:16)</em></p><p>As we prepare to take the Lord’s Supper, I want to take you back to one of the most gripping scenes in all of Scripture—Genesis 22. It’s the story of Abraham and his son, Isaac.</p><p>God had made a promise to Abraham—that through his son, Isaac, a great nation would be born, and that through that nation, all the families of the earth would be blessed.</p><p>But then came a test.</p><p><em>“Take your son,” God said, “your only son, whom you love—Isaac—and go to the region of Moriah. Sacrifice him there as a burnt offering…”</em> (Genesis 22:2)</p><p>Can you imagine that moment?</p><p>Isaac was the child of promise. The long-awaited son. And now God was asking Abraham to lay him on the altar.</p><p>And yet Abraham obeyed.</p><p>He took the wood, the fire, and the knife. He walked with Isaac up the mountain. Isaac—young, strong, and likely confused—carried the wood on his back. And then he asked his father the heartbreaking question:</p><p><em>“Father… where is the lamb for the burnt offering?”</em></p><p>And Abraham answered, <strong>“God will provide the lamb.”</strong></p><p>Of course, you may remember how the story ends: God stopped Abraham’s hand, and a ram was provided in Isaac’s place. The boy was spared. The lamb died instead.</p><p>Fast-forward 2,000 years. Another Son walks up another mountain.<br />\nThis time, He too carries the wood on His back—the cross.<br />\nThis time, there is no ram caught in the thicket.<br />\nThere is no voice calling out to stop the sacrifice.<br />\nBecause this time, the Lamb <em>is</em> the Son.</p><p><em>“For God so loved the world that He gave His only begotten Son…”</em> (John 3:16, KJV)</p><p>Isaac was called Abraham’s “only son.”<br />\nJesus is called God’s “only begotten Son.”<br />\nBoth carried the wood.<br />\nBoth were bound to the altar.<br />\nBut only one <em>was not spared.</em></p><p>Paul puts it like this in Romans 8:32:</p><p><em>“He who did not spare His own Son, but gave Him up for us all—how will He not also… graciously give us all things?”</em></p><p>So as we eat the bread this morning, and as we drink the cup, remember this:</p><p>The Father did what Abraham didn’t have to.<br />\nThe Son went where Isaac didn’t have to.<br />\nThe cross is not just a symbol of suffering—it’s the final answer to the question, <em>“Where is the lamb?”</em></p><p><strong>The lamb was Jesus-- The Lamb of God, who takes away the sin of the world.</strong></p><p>Let’s pray.</p><p>BREAD: Lord, thanks for the bread to which Christ said, “This my body which is broken for you. Do this in remembrance of me.” May we do exactly that. In Christ’s name, amen.</p><p>FRUIT OF THE VINE: Lord, thanks for the fruit of the vine to which Christ said, “This my blood of the new covenant which is shed for many for the remission of sins. Do this in remembrance of me.” Again, we pray that we do exactly that. In Christ’s name, amen.</p>", "summary": "From Mount Moriah to Mount Calvary—Abraham was asked to offer his only son, but God stopped his hand and provided a ram. At Calvary, there was no substitute for the Son. The Father did what Abraham didn't have to.", "topicTags": ["Abraham and Isaac", "Typology", "Father's Love", "Lamb of God", "Only Begotten Son"], "length": "substantive", "suggestedHymns": ["Behold the Lamb", "How Deep the Fathers Love for Us", "O Sacred Head Now Wounded"], "datePublished": "2025-03-02T00:00:00.000"}, {"title": "The Price That Was Paid", "scripturePassage": "1 Peter 1:18-21", "bodyText": "<p><strong>“The Price That Was Paid”</strong></p><p><em><strong>(1 Peter 1:18–21)</strong></em></p><p>As we prepare our hearts for the Lord’s Supper this morning, I want us to think about something we don’t often like to dwell on: <em><span class=\"underline\">the cost</span></em> of our salvation.</p><p>We live in a world where almost everything has a price tag. We know what things are worth because we know what was paid for them. And usually, the higher the price, the greater the value.</p><p>Scripture tells us the same is true of our redemption. Peter writes in 1 Peter 1:18–19:</p><p>“For you know that it was not with perishable things such as silver or gold that you were redeemed from the empty way of life handed down to you from your ancestors,<br />\nbut with the precious blood of Christ, a lamb without blemish or defect.”</p><p>Peter reminds us first of what didn’t save us.</p><p>Not money.</p><p>Not effort.</p><p>Not morality.</p><p>Not heritage.</p><p>Not religious activity.</p><p>Silver and gold — the most valuable things people could imagine — were not enough.</p><p>Instead, our redemption required something infinitely more precious:<br />\nthe blood of Christ.</p><p>That word “redeemed” is important. It’s the language of the marketplace. It refers to the price paid to buy a slave out of bondage. And Peter says we were redeemed from an “empty” or “futile” way of life — a life trapped by sin, guilt, and separation from God.</p><p>Freedom came at a price. And that price was not an object — it was a life.</p><p>So as we take the bread this morning, we remember a body willingly given. As we drink the cup, we remember blood deliberately shed.</p><p>And we remember that our forgiveness is not cheap. It is free to us — but only because it was unimaginably costly to Him.</p><p>This table reminds us of our value, not because of who we are, but because of what was paid for us.</p><p>Let’s remember Him now.</p><p>Let’s pray.</p>", "summary": "Our redemption couldn't be purchased with silver or gold—it required the precious blood of Christ. Forgiveness is free to us, but it was unimaginably costly to Him. This table reminds us of our value.", "topicTags": ["Redemption", "Blood of Christ", "Cost of Salvation", "Value", "Precious Blood"], "length": "medium", "suggestedHymns": ["Redeemed How I Love to Proclaim It", "Nothing but the Blood", "Are You Washed in the Blood"], "datePublished": "2025-08-17T00:00:00.000"}, {"title": "The Silence of the Lamb", "scripturePassage": "Isaiah 53:7; Matthew 27:12-14", "bodyText": "<p><strong>“The Silence of the Lamb”</strong><br />\n<em>(Isaiah 53:7; Matthew 27:12–14)</em></p><p>As we come to the Lord’s table this morning, I want to draw your attention to something that Jesus <em>didn’t</em> do.</p><p>Isaiah 53:7 says this about the suffering servant:</p><p><em>“He was oppressed and afflicted, yet He did not open His mouth;<br />\nHe was led like a lamb to the slaughter,<br />\nand as a sheep before its shearers is silent,<br />\nso He did not open His mouth.”</em></p><p>That prophecy came to life in the Gospels.<br />\nIn <strong>Matthew 27</strong>, Jesus stood before Pilate. False charges were hurled at Him. The religious leaders stirred the crowd. Pilate pressed Him to respond. But Scripture says:</p><p><em>“But Jesus gave him no answer, not even to a single charge,<br />\nso that the governor was greatly amazed.”</em> (Matthew 27:14)</p><p>Why the silence?</p><p>Jesus could have spoken one word and ended it all.<br />\nHe could have defended Himself, overpowered the mob, or called on twelve legions of angels.<br />\nBut instead… <strong>He stayed silent.</strong></p><p>Not because He was weak. Not because He was guilty.<br />\nBut because <strong>He was determined</strong>—to go all the way to the cross.</p><p>He was silent so He could speak grace into our lives.<br />\nHe was silent in court so that He could intercede for us before the throne of God.<br />\nHe bore the shame without protest so that we would never stand condemned.</p><p>This morning, as we take the bread and drink the cup, remember this:</p><p>Jesus suffered… in silence.<br />\nNot to make us feel guilty, but to set us free.<br />\nNot to shame us, but to save us.<br />\nNot to win an argument, but to win our hearts.</p><p>So as you hold the bread—remember His body, willingly broken.<br />\nAs you lift the cup—remember His blood, quietly poured out.</p><p>And in the silence of your own heart, let your prayer be simple:</p><p>“Thank You, Lord—for staying silent so that I could be forgiven.”</p><p>Let’s pray.</p>", "summary": "Jesus could have spoken one word and ended it all, but He stayed silent before His accusers—not out of weakness, but out of determination to go all the way to the cross for us.", "topicTags": ["Silence of Christ", "Isaiah 53", "Trial of Jesus", "Determination", "Lamb of God"], "length": "medium", "suggestedHymns": ["O Sacred Head Now Wounded", "Man of Sorrows", "Lead Me to Calvary"], "datePublished": "2025-09-21T00:00:00.000"}, {"title": "The Will to Crush", "scripturePassage": "Isaiah 53:10", "bodyText": "<p><strong>Lord’s Supper Reflection: “The Will to Crush”</strong><br />\n<em>(Isaiah 53:10)</em></p><p>As we gather around the Lord’s table this morning, I want to share a verse that can be hard to read. It’s from Isaiah 53—a passage written centuries before Jesus came, but one that describes His suffering with stunning clarity.</p><p>Here’s what verse 10 says:</p><p><strong>“Yet it was the Lord’s will to crush Him and cause Him to suffer,<br />\nand though the Lord makes His life an offering for sin,<br />\nHe will see His offspring and prolong His days,<br />\nand the will of the Lord will prosper in His hand.”</strong> (Isaiah 53:10, NIV)</p><p>Just let that first line sink in for a moment:<br />\n<strong>“It was the Lord’s will to crush Him.”</strong></p><p>That’s a hard sentence. We don’t usually like to think of suffering as something that’s part of God’s plan. We like to talk about God’s will in terms of blessings, open doors, and answered prayers.</p><p>But Isaiah tells us that the suffering of Jesus wasn’t a mistake. It wasn’t a detour in the plan. It <em>was</em> the plan.</p><p>The Father willingly gave His own Son—<em>not reluctantly</em>, not <em>because He had no choice</em>, but because <strong>He loved us that much</strong>. He saw the full weight of our sin, the full cost of our redemption, and He said, <strong>“I will pay it.”</strong> And Jesus said, “I’ll go.”</p><p>There’s something important about this as we come to the Lord’s Supper. We’re not just remembering a death—we’re remembering a <em>decision</em>. A sacrifice made willingly. A Savior who <em>chose</em> the cross.</p><p>Sometimes when life is hard, we’re tempted to question God’s love. But the cross answers that question once and for all.</p><p>“It was the Lord’s will to crush Him…”</p><p>Yes—it was terrible.<br />\nYes—it was violent.<br />\nBut it was also <em>beautiful</em>, because <strong>through that suffering came salvation</strong>.</p><p>Isaiah goes on to say, “He will see His offspring”—that’s <em>us</em>, the church—<strong>those redeemed by His blood.</strong></p><p>So as you take the bread this morning, remember: His body was broken, not by accident, but on purpose.</p><p>As you drink the cup, remember: His blood was poured out, not by men alone, but by a loving God who <em>offered Him</em> as a sacrifice for our sin.</p><p>This table is a reminder of a painful truth—salvation isn’t cheap. But it’s also a glorious truth: it’s already been paid for.</p><p>Let’s pray.</p><p>BREAD: Lord, thanks for the bread to which Christ said, “This my body which is broken for you. Do this in remembrance of me.” May we do exactly that. In Christ’s name, amen.</p><p>FRUIT OF THE VINE: Lord, thanks for the fruit of the vine to which Christ said, “This my blood of the new covenant which is shed for many for the remission of sins. Do this in remembrance of me.” Again, we pray that we do exactly that. In Christ’s name, amen.</p>", "summary": "Isaiah 53:10 says it was the Lord's will to crush His Son—a hard truth that reveals the cross wasn't an accident but a deliberate plan. We remember not just a death but a decision made in love.", "topicTags": ["Sovereignty of God", "Isaiah 53", "God's Plan", "Willing Sacrifice", "Cost of Redemption"], "length": "substantive", "suggestedHymns": ["How Deep the Fathers Love for Us", "Hallelujah What a Savior", "O the Deep Deep Love of Jesus"], "datePublished": "2025-10-19T00:00:00.000"}, {"title": "This Do in Remembrance of Me", "scripturePassage": "Luke 22:19; 1 Corinthians 1:18", "bodyText": "<p><strong>“This Do in Remembrance of Me”</strong><br />\n<em>(Luke 22:19; 1 Corinthians 1:18)</em></p><p>Jesus didn’t ask us to build a statue in His honor.<br />\nHe didn’t ask us to hold a yearly memorial service or to decorate a sacred place.</p><p>Instead, on the night He was betrayed, Jesus took bread, gave thanks, broke it, and said:</p><p><em>“This is My body, given for you; <strong>do this in remembrance of Me</strong>.”</em> — Luke 22:19</p><p>He gave us this simple, sacred act—because He knew we would need to be reminded.</p><p>Reminded of His love.<br />\nReminded of His sacrifice.<br />\nReminded that <strong>our salvation was never meant to be earned</strong>—only received.</p><p>The early church did this every week. And here we are, nearly 2,000 years later, doing the same thing.</p><p>Why? Because we forget.</p><p>We get distracted.<br />\nWe become discouraged.<br />\nWe drift into thinking our worth is based on our performance, or our identity is found in something other than Christ.</p><p>But this table recenters us.</p><p>Paul says in <strong>1 Corinthians 1:18</strong>:</p><p><em>“The message of the cross is foolishness to those who are perishing,<br />\nbut to us who are being saved it is the power of God.”</em></p><p>So here, in this quiet moment, we remember.</p><p>Not just that Jesus lived.<br />\nNot just that He taught.<br />\nBut that <strong>He died</strong>—for us.</p><p>And we remember it not with flowers or monuments,<br />\nbut with bread… and with a cup.</p><p>A broken body.<br />\nShed blood.<br />\nAnd a love that still saves.</p><p>Let’s remember Him now.</p><p>Let’s pray.</p>", "summary": "Jesus didn't ask for a statue or a yearly service—He gave us a simple, sacred act. We remember because we forget, and this table recenters us on the cross when life pulls us away.", "topicTags": ["Remembrance", "Purpose of the Lords Supper", "Weekly Observance", "Power of the Cross", "Identity in Christ"], "length": "brief", "suggestedHymns": ["In Remembrance", "When I Survey the Wondrous Cross", "Near the Cross"], "datePublished": "2025-06-15T00:00:00.000"}, {"title": "Why He Came", "scripturePassage": "Mark 10:45; Hebrews 2:14-15", "bodyText": "<p><strong>“Why He Came”</strong><br />\n<em>(Mark 10:45; Hebrews 2:14–15)</em></p><p>It’s the beginning of December, and everywhere you look, people are thinking about Jesus.<br />\nYou’ll hear His name in songs at the mall. You’ll see nativity scenes on front lawns. You’ll even hear talk about peace, joy, and love.</p><p>That can be a good thing. But let’s not let the season blur our understanding of who Jesus really is—or why He came.</p><p>The Bible never tells us to celebrate His birth.<br />\nBut it does command us to remember <strong>His death.</strong></p><p><em>“Do this in remembrance of Me,”</em> He said—not at a cradle, but at a table.<br />\nNot surrounded by shepherds and gifts, but by bread, a cup… and a looming cross.</p><p>Jesus didn’t come to give us a holiday.<br />\nHe came to <strong>give His life</strong>.</p><p>Mark 10:45 says:</p><p><em>“For even the Son of Man did not come to be served,<br />\nbut to serve, and to give His life as a ransom for many.”</em></p><p>Hebrews 2:14–15 says:</p><p><em>“…He too shared in their humanity so that by His death He might destroy him who holds the power of death—that is, the devil—and free those who all their lives were held in slavery by their fear of death.”</em></p><p>That’s why He came.<br />\nNot just to walk among us—but to <strong>die for us</strong>.<br />\nNot just to shine a light—but to <strong>become the Lamb</strong>.</p><p>So today, as we take the bread and drink the cup, we don’t look to a manger.<br />\nWe look to the cross.</p><p>And we remember that the greatest gift ever given wasn’t wrapped in cloth and laid in a feeding trough…<br />\nIt was nailed to a cross and offered for sinners like us.</p><p>That’s why He came.<br />\nAnd that’s why we give thanks.</p><p>Let’s pray.</p>", "summary": "In December the world thinks about Jesus, but the Bible never tells us to celebrate His birth—it commands us to remember His death. He came not to give us a holiday but to give His life as a ransom.", "topicTags": ["Christmas", "Purpose of Christ", "Ransom", "Freedom from Death", "Incarnation"], "length": "brief", "suggestedHymns": ["O Come O Come Emmanuel", "What Child Is This", "Hark the Herald Angels Sing"], "datePublished": "2025-12-07T00:00:00.000"}];

    let brief = 0, medium = 0, substantive = 0;

        <span class="preview-badge">${p.length}</span>
      `;

    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      logEl.style.display = 'block';
      const entry = document.createElement('div');
      entry.className = `log-entry log-${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function uploadAll() {
      const btn = document.getElementById('uploadBtn');
      const bar = document.getElementById('progressBar');
      const fill = document.getElementById('progressFill');

      btn.disabled = true;
      btn.textContent = 'Uploading...';
      bar.style.display = 'block';

      let success = 0, errors = 0;

      for (let i = 0; i < presentations.length; i++) {
        const p = presentations[i];
        try {
          await db.collection('presentations').add(p);
          success++;
          log(`✓ Uploaded: ${p.title}`, 'success');
        } catch (err) {
          errors++;
          log(`✗ Failed: ${p.title} — ${err.message}`, 'error');
        }
        fill.style.width = `${((i + 1) / presentations.length) * 100}%`;
      }

      log(`Done! ${success} uploaded, ${errors} errors.`, success === presentations.length ? 'success' : 'error');
      btn.textContent = `Upload Complete (${success}/${presentations.length})`;
    }
