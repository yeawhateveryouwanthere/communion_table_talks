<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Presentations to Firestore</title>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; background: #FFF8F0; color: #2D1F24; }
    h1 { color: #6B2D3E; }
    .status { margin: 10px 0; padding: 10px; border-radius: 6px; }
    .success { background: #E8F5E9; color: #2E7D32; }
    .error { background: #FFEBEE; color: #C62828; }
    .info { background: #E3F2FD; color: #1565C0; }
    button { padding: 12px 24px; background: #6B2D3E; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 5px; }
    button:hover { background: #8B4D5E; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { background: white; border: 1px solid #E0D4D8; border-radius: 8px; padding: 15px; max-height: 400px; overflow-y: auto; font-size: 14px; line-height: 1.6; }
    .count { font-size: 24px; font-weight: bold; color: #6B2D3E; }
  </style>
</head>
<body>
  <h1>Upload Presentations to Firestore</h1>
  <p>This will upload all 60 new Lord's Supper presentations to your Firestore database.</p>

  <div id="summary"></div>

  <button id="uploadBtn" onclick="uploadAll()">Upload All Presentations</button>
  <button onclick="checkExisting()">Check Existing Count</button>

  <div id="log"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAsMg0mXxevmFdPlVH6ilvymdryJWpU9pk",
      authDomain: "communion-table-talks.firebaseapp.com",
      projectId: "communion-table-talks",
      storageBucket: "communion-table-talks.firebasestorage.app",
      messagingSenderId: "6523279108",
      appId: "1:6523279108:web:2b953ffbc22b272a6b2251"
    });
    const db = firebase.firestore();

    function log(msg, type) {
      const el = document.getElementById('log');
      el.innerHTML += '<div class="status ' + (type || 'info') + '">' + msg + '</div>';
      el.scrollTop = el.scrollHeight;
    }

    async function checkExisting() {
      const snapshot = await db.collection('presentations').get();
      log('Currently ' + snapshot.size + ' presentations in Firestore.', 'info');
    }

    // All presentations data
    const briefPresentations = BRIEF_DATA;
    const medium1Presentations = MEDIUM1_DATA;
    const medium2Presentations = MEDIUM2_DATA;
    const substantive1Presentations = SUBSTANTIVE1_DATA;
    const substantive2Presentations = SUBSTANTIVE2_DATA;

    const allPresentations = [
      ...briefPresentations,
      ...medium1Presentations,
      ...medium2Presentations,
      ...substantive1Presentations,
      ...substantive2Presentations
    ];

    document.getElementById('summary').innerHTML =
      '<p>Ready to upload <span class="count">' + allPresentations.length + '</span> presentations: ' +
      briefPresentations.length + ' brief, ' +
      (medium1Presentations.length + medium2Presentations.length) + ' medium, ' +
      (substantive1Presentations.length + substantive2Presentations.length) + ' substantive.</p>';

    async function uploadAll() {
      const btn = document.getElementById('uploadBtn');
      btn.disabled = true;
      btn.textContent = 'Uploading...';

      let success = 0;
      let errors = 0;

      for (let i = 0; i < allPresentations.length; i++) {
        const p = allPresentations[i];
        try {
          await db.collection('presentations').add(p);
          success++;
          log('✓ (' + success + '/' + allPresentations.length + ') ' + p.title, 'success');
        } catch (err) {
          errors++;
          log('✗ Failed: ' + p.title + ' — ' + err.message, 'error');
        }
      }

      log('Done! ' + success + ' uploaded, ' + errors + ' errors.', success > 0 ? 'success' : 'error');
      btn.disabled = false;
      btn.textContent = 'Upload Complete';
    }
  </script>
</body>
</html>
